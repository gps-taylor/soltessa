<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sales & Buyers · Soltessa</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
<div id="app" data-page="sales"></div>
<div class="drawer-scrim" id="scrim"></div>

<template id="page">
  <div class="page-head">
    <div class="page-head-row">
      <div>
        <div class="eyebrow">Module 9 · Buyer management <span class="prov conf">confirmed — Sales Manager Plus</span></div>
        <h1 class="page-title">Sales & Buyers</h1>
        <p class="page-sub">Manage buyers from contract through close — deposits, agreements, and the escrow and contingency milestones a design center must respect.</p>
      </div>
      <button class="btn primary"><span data-ic="plus"></span>Add buyer</button>
    </div>
  </div>

  <div data-scopebar="scoped"></div>

  <div class="kpi-grid mb-16" id="kpis"></div>

  <div class="grid grid-2-1 mb-16">
    <div class="card">
      <div class="card-head"><div class="card-title"><span data-ic="sales"></span>Buyers</div>
        <div class="tbl-tools" data-target="#buyers" data-filter-scope><span class="fchip active" data-match="all"><span data-ic="filter"></span>All</span><span class="fchip" data-match="escrow">In escrow</span><span class="fchip" data-match="closed">Closed</span></div>
      </div>
      <div class="card-body flush"><div class="tbl-wrap"><table class="tbl tbl-clickable">
        <thead><tr><th>Buyer</th><th>Lot / Plan</th><th class="right">Option deposit</th><th class="right">Balance over allow.</th><th>Status</th></tr></thead>
        <tbody id="buyers"></tbody>
      </table></div></div>
    </div>

    <div class="card">
      <div class="card-head"><div class="card-title"><span data-ic="clock"></span>Escrow & contingency milestones</div></div>
      <div class="card-body"><div class="stack gap-16" id="milestones"></div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-head"><div class="card-title"><span data-ic="file"></span>Buyer agreements</div><span class="card-sub">Generated from templates, auto-filled with buyer/lot/selection detail</span></div>
    <div class="card-body flush"><div class="tbl-wrap"><table class="tbl tbl-clickable">
      <thead><tr><th>Document</th><th>Buyer</th><th>Type</th><th class="right">Generated</th><th class="right">Status</th></tr></thead>
      <tbody id="docs"></tbody>
    </table></div></div>
  </div>
</template>

<script src="assets/data/demo.js"></script>
<script src="assets/js/app.js"></script>
<script>
  const S=window.Soltessa; S.mount({active:'sales'});
  const SC=S.scope(); const commName = SC.isAll ? null : SC.dev.name;
  const bData = DEMO.byComm(DEMO.buyers, commName);
  const escrow = bData.filter(b=>b.status==='escrow').length;
  const deposits = bData.reduce((a,b)=>a+b.deposit,0);
  const kpis=[
    {label:'Active buyers',icon:'sales',value:String(bData.length),delta: SC.isAll?'+5 this month':'in this community',d:'up',s:[34,36,37,39,40,41,42]},
    {label:'In escrow',icon:'clock',value:String(escrow),delta: escrow?'closing soon':'none open',d:'flat',s:[15,17,16,18,19,19,19]},
    {label:'Option deposits held',icon:'dollar',value:'$'+(deposits/1000).toFixed(0)+'k',delta:`across ${bData.length} buyers`,d:'up',s:[180,188,195,201,208,210,214]},
    {label:'Overdue milestones',icon:'alert',value: SC.isAll?'2':'1',delta:'need follow-up',d:'down',s:[5,4,4,3,2,2,2]},
  ];
  document.getElementById('kpis').innerHTML=kpis.map(k=>`<div class="kpi"><div class="kpi-label">${S.icon(k.icon)} ${k.label}</div><div class="kpi-value">${k.value}</div><div class="kpi-delta ${k.d}">${k.delta}</div>${S.spark(k.s)}</div>`).join('');

  const stBadge = st => ({production:'<span class="badge accent"><span class="d"></span>In production',escrow:'<span class="badge info"><span class="d"></span>In escrow',contingency:'<span class="badge warn"><span class="d"></span>Contingency',closed:'<span class="badge ok"><span class="d"></span>Closed',selection:'<span class="badge accent"><span class="d"></span>Selection'}[st]||'<span class="badge accent"><span class="d"></span>In production');
  const buyers = bData.map(b => [b.name, `${b.lot} · ${b.plan}`, '$'+b.deposit.toLocaleString(), b.over?('+$'+b.over.toLocaleString()):'$0', stBadge(b.status)]);
  document.getElementById('buyers').innerHTML = buyers.length ? buyers.map(b=>`<tr><td class="primary">${b[0]}</td><td class="muted">${b[1]}</td><td class="num tnum">${b[2]}</td><td class="num tnum" style="color:${b[3]==='$0'?'var(--ink-3)':'var(--danger)'}">${b[3]}</td><td>${b[4]}</span></td></tr>`).join('') : `<tr><td colspan="5" class="muted" style="text-align:center;padding:24px">No buyers in this development.</td></tr>`;

  const msAll=[
    ['Patel — loan contingency','Jul 8','danger','3 days','Sienna Pass'],
    ['Webb — appraisal due','Jul 14','warn','9 days','Desert Vista'],
    ['Nguyen — close of escrow','Jul 22','info','17 days','Cholla Ridge'],
    ['Klein — inspection contingency','Jul 30','info','25 days','Desert Vista'],
    ['Archer — close of escrow','Aug 4','info','30 days','Aspen Meadows'],
  ];
  const ms = commName ? msAll.filter(m=>m[4]===commName) : msAll;
  document.getElementById('milestones').innerHTML = ms.length ? ms.map(m=>`
    <div class="flex items-center between"><div><div class="fw-600 fs-13">${m[0]}</div><div class="muted fs-12">${m[1]}</div></div><span class="badge ${m[2]}"><span class="d"></span>${m[3]}</span></div>`).join('') : `<div class="muted fs-13" style="text-align:center;padding:18px">No upcoming milestones in this development.</div>`;

  const docsAll=[
    ['Option Selection Agreement','Raj & Priya Patel','Selection','Jun 24','<span class="badge ok"><span class="d"></span>Signed','Sienna Pass'],
    ['Purchase Addendum','The Nguyen family','Addendum','Jun 22','<span class="badge ok"><span class="d"></span>Signed','Cholla Ridge'],
    ['Option Selection Agreement','Marcus Webb','Selection','Jun 27','<span class="badge warn"><span class="d"></span>Out for signature','Desert Vista'],
    ['Change Order Acknowledgment','Raj & Priya Patel','Change order','Jun 28','<span class="badge accent"><span class="d"></span>Draft','Sienna Pass'],
    ['Option Selection Agreement','Helen & Roy Archer','Selection','Jun 26','<span class="badge warn"><span class="d"></span>Out for signature','Aspen Meadows'],
  ];
  const docs = commName ? docsAll.filter(d=>d[5]===commName) : docsAll;
  document.getElementById('docs').innerHTML = docs.length ? docs.map((d,i)=>`<tr data-didx="${i}"><td class="primary">${d[0]}</td><td class="muted">${d[1]}</td><td><span class="tag">${d[2]}</span></td><td class="num right muted">${d[3]}</td><td class="right">${d[4]}</span></td></tr>`).join('') : `<tr><td colspan="5" class="muted" style="text-align:center;padding:24px">No agreements in this development.</td></tr>`;

  // ============ INTERACTIVITY ============
  // Add buyer
  document.querySelector('.page-head .btn.primary').addEventListener('click', () => S.modal({
    eyebrow:'Sales', title:'Add buyer',
    body:`<div class="form-grid">
      <label class="field span-2"><span class="field-lbl">Buyer name(s)</span><input data-field="name" placeholder="e.g. Jordan & Casey Lee"/></label>
      <label class="field"><span class="field-lbl">Lot</span><input data-field="lot" placeholder="Lot 27"/></label>
      <label class="field"><span class="field-lbl">Plan</span><select data-field="plan">${DEMO.plans.map(p=>`<option>${p.name}</option>`).join('')}</select></label>
      <label class="field"><span class="field-lbl">Option deposit</span><input data-field="dep" placeholder="$2,500"/></label>
      <label class="field"><span class="field-lbl">Status</span><select data-field="status"><option>In escrow</option><option>Contingency</option><option>In production</option></select></label>
    </div>`,
    actions:[{label:'Cancel',kind:'ghost'},{label:'Add buyer',kind:'primary',icon:'plus',onClick:(m)=>{const f=S.readForm(m);S.toast(`${f.name||'New buyer'} added on ${f.lot||'lot'} (demo).`);}}] }));

  // buyer rows → record
  document.querySelectorAll('#buyers tr').forEach((tr,i)=>tr.addEventListener('click',()=>{
    const b=buyers[i]; const status=b[4].replace(/<[^>]+>/g,'').trim();
    S.drawer({ eyebrow:'Buyer record', title:b[0], width:500,
      body:`<div class="meta-list mb-16">
        <div class="ml-row"><span class="ml-k">Lot / Plan</span><span class="ml-v">${b[1]}</span></div>
        <div class="ml-row"><span class="ml-k">Option deposit</span><span class="ml-v t-mono">${b[2]}</span></div>
        <div class="ml-row"><span class="ml-k">Balance over allowance</span><span class="ml-v t-mono" style="color:var(--danger)">${b[3]}</span></div>
        <div class="ml-row"><span class="ml-k">Status</span><span class="ml-v">${b[4]}</span></div>
      </div>
      <div class="divider"><span class="lbl">Quick actions</span><span class="line"></span></div>
      <div class="flex gap-8 wrap mt-16">
        <button class="btn primary sm" data-toast="Payment recorded (demo).">${S.icon('dollar')}Record payment</button>
        <button class="btn ghost sm" data-toast="Agreement generated (demo).">${S.icon('file')}Generate agreement</button>
        <button class="btn ghost sm" data-drawer-close>Close</button>
      </div>` });
  }));

  // milestone rows → confirm action
  document.querySelectorAll('#milestones > div').forEach((row,i)=>{ row.style.cursor='pointer'; row.addEventListener('click',()=>{
    const m=ms[i];
    S.confirmAction({ eyebrow:'Escrow & contingency', title:m[0], icon:'check',
      message:`${m[0]} is due ${m[1]} (${m[3]}). Mark this milestone complete?`,
      confirmLabel:'Mark complete', onConfirm:()=>S.toast(`“${m[0]}” marked complete (demo).`) });
  });});

  // agreement rows → preview
  document.querySelectorAll('#docs tr').forEach((tr,i)=>tr.addEventListener('click',()=>{
    const d=docs[i]; const status=d[4].replace(/<[^>]+>/g,'').trim();
    S.modal({ eyebrow:d[1], title:d[0],
      body:`<div class="doc-preview"><div class="meta-list">
        <div class="ml-row"><span class="ml-k">Document type</span><span class="ml-v"><span class="tag">${d[2]}</span></span></div>
        <div class="ml-row"><span class="ml-k">Buyer</span><span class="ml-v">${d[1]}</span></div>
        <div class="ml-row"><span class="ml-k">Generated</span><span class="ml-v">${d[3]}</span></div>
        <div class="ml-row"><span class="ml-k">Status</span><span class="ml-v">${d[4]}</span></div>
      </div></div>`,
      actions: status==='Signed' ? [{label:'Close',kind:'ghost'},{label:'Download',kind:'primary',icon:'download',onClick:()=>S.toast(`${d[0]} downloaded (demo).`)}]
        : [{label:'Close',kind:'ghost'},{label:'Send for signature',kind:'primary',icon:'send',onClick:()=>S.toast(`${d[0]} sent for signature (demo).`)}] });
  }));

  // KPI cards
  const kpiR=['#buyers','#milestones','#buyers','#milestones'];
  document.querySelectorAll('#kpis .kpi').forEach((c,i)=>{ c.style.cursor='pointer'; c.addEventListener('click',()=>{ const t=document.querySelector(kpiR[i]); if(t) t.scrollIntoView({behavior:'smooth',block:'center'}); }); });
</script>
</body>
</html>
