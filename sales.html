<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sales & Buyers · Soltessa</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
<div id="app" data-page="sales"></div>
<div class="drawer-scrim" id="scrim"></div>

<template id="page">
  <div class="page-head">
    <div class="page-head-row">
      <div>
        <div class="eyebrow">Module 9 · Buyer management <span class="prov conf">confirmed — Sales Manager Plus</span></div>
        <h1 class="page-title">Sales & Buyers</h1>
        <p class="page-sub">Manage buyers from contract through close — deposits, agreements, and the escrow and contingency milestones a design center must respect.</p>
      </div>
      <button class="btn primary"><span data-ic="plus"></span>Add buyer</button>
    </div>
  </div>

  <div class="kpi-grid mb-16" id="kpis"></div>

  <div class="grid grid-2-1 mb-16">
    <div class="card">
      <div class="card-head"><div class="card-title"><span data-ic="sales"></span>Buyers</div>
        <div class="tbl-tools"><span class="fchip active"><span data-ic="filter"></span>All</span><span class="fchip">In escrow</span><span class="fchip">Closed</span></div>
      </div>
      <div class="card-body flush"><div class="tbl-wrap"><table class="tbl tbl-clickable">
        <thead><tr><th>Buyer</th><th>Lot / Plan</th><th class="right">Option deposit</th><th class="right">Balance over allow.</th><th>Status</th></tr></thead>
        <tbody id="buyers"></tbody>
      </table></div></div>
    </div>

    <div class="card">
      <div class="card-head"><div class="card-title"><span data-ic="clock"></span>Escrow & contingency milestones</div></div>
      <div class="card-body"><div class="stack gap-16" id="milestones"></div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-head"><div class="card-title"><span data-ic="file"></span>Buyer agreements</div><span class="card-sub">Generated from templates, auto-filled with buyer/lot/selection detail</span></div>
    <div class="card-body flush"><div class="tbl-wrap"><table class="tbl tbl-clickable">
      <thead><tr><th>Document</th><th>Buyer</th><th>Type</th><th class="right">Generated</th><th class="right">Status</th></tr></thead>
      <tbody id="docs"></tbody>
    </table></div></div>
  </div>
</template>

<script src="assets/data/demo.js"></script>
<script src="assets/js/app.js"></script>
<script>
  const S=window.Soltessa; S.mount({active:'sales'});
  const kpis=[
    {label:'Active buyers',icon:'sales',value:'42',delta:'+5 this month',d:'up',s:[34,36,37,39,40,41,42]},
    {label:'In escrow',icon:'clock',value:'19',delta:'3 closing < 14 days',d:'flat',s:[15,17,16,18,19,19,19]},
    {label:'Option deposits held',icon:'dollar',value:'$214k',delta:'across 42 buyers',d:'up',s:[180,188,195,201,208,210,214]},
    {label:'Overdue milestones',icon:'alert',value:'2',delta:'need follow-up',d:'down',s:[5,4,4,3,2,2,2]},
  ];
  document.getElementById('kpis').innerHTML=kpis.map(k=>`<div class="kpi"><div class="kpi-label">${S.icon(k.icon)} ${k.label}</div><div class="kpi-value">${k.value}</div><div class="kpi-delta ${k.d}">${k.delta}</div>${S.spark(k.s)}</div>`).join('');

  const buyers=[
    ['Raj & Priya Patel','Lot 14 · Acacia 2210','$2,500','+$1,040','<span class="badge accent"><span class="d"></span>In production'],
    ['The Nguyen family','Lot 09 · Ocotillo 1980','$2,000','+$2,310','<span class="badge info"><span class="d"></span>In escrow'],
    ['Marcus Webb','Lot 22 · Mesquite 3120','$3,500','+$4,120','<span class="badge info"><span class="d"></span>In escrow'],
    ['Elena Vasquez','Lot 17 · Sabino 2640','$3,000','+$3,890','<span class="badge accent"><span class="d"></span>In production'],
    ['Sofia & Aaron Klein','Lot 31 · Mesquite 3120','$3,500','+$680','<span class="badge warn"><span class="d"></span>Contingency'],
    ['The Cortez family','Lot 02 · Acacia 2210','$2,500','+$1,420','<span class="badge ok"><span class="d"></span>Closed'],
  ];
  document.getElementById('buyers').innerHTML=buyers.map(b=>`<tr><td class="primary">${b[0]}</td><td class="muted">${b[1]}</td><td class="num tnum">${b[2]}</td><td class="num tnum" style="color:var(--danger)">${b[3]}</td><td>${b[4]}</span></td></tr>`).join('');

  const ms=[
    ['Patel — loan contingency','Jul 8','danger','3 days'],
    ['Webb — appraisal due','Jul 14','warn','9 days'],
    ['Nguyen — close of escrow','Jul 22','info','17 days'],
    ['Klein — inspection contingency','Jul 30','info','25 days'],
  ];
  document.getElementById('milestones').innerHTML=ms.map(m=>`
    <div class="flex items-center between"><div><div class="fw-600 fs-13">${m[0]}</div><div class="muted fs-12">${m[1]}</div></div><span class="badge ${m[2]}"><span class="d"></span>${m[3]}</span></div>`).join('');

  const docs=[
    ['Option Selection Agreement','Raj & Priya Patel','Selection','Jun 24','<span class="badge ok"><span class="d"></span>Signed'],
    ['Purchase Addendum','The Nguyen family','Addendum','Jun 22','<span class="badge ok"><span class="d"></span>Signed'],
    ['Option Selection Agreement','Marcus Webb','Selection','Jun 27','<span class="badge warn"><span class="d"></span>Out for signature'],
    ['Change Order Acknowledgment','Raj & Priya Patel','Change order','Jun 28','<span class="badge accent"><span class="d"></span>Draft'],
  ];
  document.getElementById('docs').innerHTML=docs.map(d=>`<tr><td class="primary">${d[0]}</td><td class="muted">${d[1]}</td><td><span class="tag">${d[2]}</span></td><td class="num right muted">${d[3]}</td><td class="right">${d[4]}</span></td></tr>`).join('');
</script>
</body>
</html>
