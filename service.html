<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Customer Service · Soltessa</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
<div id="app" data-page="service"></div>
<div class="drawer-scrim" id="scrim"></div>

<div class="drawer" id="woDrawer" style="width:540px">
  <div class="drawer-head">
    <div><div class="eyebrow">Work order <span class="prov conf">confirmed</span></div><div class="drawer-title" id="woTitle">WO-1042</div></div>
    <button class="btn-icon" data-close><span data-ic="x"></span></button>
  </div>
  <div class="drawer-body" id="woBody"></div>
</div>

<template id="page">
  <div class="page-head">
    <div class="page-head-row">
      <div>
        <div class="eyebrow">Module 10 · Post-close <span class="prov conf">confirmed — Customer Service Plus</span></div>
        <h1 class="page-title">Customer Service &amp; Warranty</h1>
        <p class="page-sub">Post-close warranty and service — homeowner records, service requests, and the work-order aging and subcontractor performance data that feeds purchasing.</p>
      </div>
      <button class="btn primary"><span data-ic="plus"></span>Log service request</button>
    </div>
  </div>

  <div data-scopebar="scoped"></div>

  <div class="kpi-grid mb-16" id="kpis"></div>

  <div class="seg mb-16" id="tabs">
    <button class="active" data-tab="tickets">Service requests</button>
    <button data-tab="aging">Work-order aging</button>
    <button data-tab="perf">Subcontractor performance</button>
  </div>

  <!-- TICKETS -->
  <div data-panel="tickets">
    <div class="grid grid-2-1 mb-16">
      <div class="card">
        <div class="card-head"><div class="card-title"><span data-ic="inbox"></span>Open service requests</div>
          <div class="tbl-tools"><span class="fchip active"><span data-ic="filter"></span>All</span><span class="fchip">Warranty</span><span class="fchip">Callback</span></div>
        </div>
        <div class="card-body flush"><div class="tbl-wrap"><table class="tbl tbl-clickable">
          <thead><tr><th>Ticket / home</th><th>Category</th><th>Installer</th><th class="right">Opened</th><th>Status</th></tr></thead>
          <tbody id="tickets"></tbody>
        </table></div></div>
      </div>

      <div class="card">
        <div class="card-head"><div class="card-title"><span data-ic="trend"></span>Call types this quarter</div><span class="card-sub">Categorized to pinpoint quality issues</span></div>
        <div class="card-body"><div class="stack gap-16" id="calltypes"></div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-head"><div class="card-title"><span data-ic="home"></span>Homeowner / lot service record</div><span class="card-sub">One master record per home for post-close reference</span></div>
      <div class="card-body flush"><div class="tbl-wrap"><table class="tbl tbl-clickable">
        <thead><tr><th>Homeowner</th><th>Lot / Plan</th><th class="right">Closed</th><th class="right">Warranty ends</th><th class="right">Requests</th><th>Coverage</th></tr></thead>
        <tbody id="homes"></tbody>
      </table></div></div>
    </div>
  </div>

  <!-- AGING -->
  <div data-panel="aging" style="display:none">
    <div class="card mb-16">
      <div class="notice warn"><span data-ic="alert"></span><div><strong>2 work orders past 14 days.</strong> Outstanding work orders by sub with elapsed time since issue — management efficiency reporting <span class="prov conf">confirmed</span>.</div></div>
      <div class="card-body flush"><div class="tbl-wrap"><table class="tbl tbl-clickable">
        <thead><tr><th>Work order</th><th>Home / lot</th><th>Subcontractor</th><th>Issue</th><th class="right">Issued</th><th class="right">Age</th><th>Status</th></tr></thead>
        <tbody id="aging"></tbody>
      </table></div></div>
    </div>
  </div>

  <!-- PERFORMANCE -->
  <div data-panel="perf" style="display:none">
    <div class="notice" style="background:#eef1f6;border:1px solid #dde3ec;margin-bottom:16px"><span data-ic="grid" style="color:#5a6b8c"></span><div>Subcontractor performance is evaluated <b>company-wide</b> — a sub's callback rate spans every community they work. This view does not change with the development scope.</div></div>
    <div class="card">
      <div class="card-head"><div class="card-title"><span data-ic="users"></span>Subcontractor performance</div><span class="card-sub">Callbacks, completion rates, problem-sub isolation — feeds supplier records (Module 3) and bid awarding (Module 5)</span></div>
      <div class="card-body flush"><div class="tbl-wrap"><table class="tbl">
        <thead><tr><th>Subcontractor</th><th>Category</th><th class="right">Jobs (90d)</th><th class="right">Callbacks</th><th class="right">Callback rate</th><th class="right">Avg close</th><th>Rating</th></tr></thead>
        <tbody id="perf"></tbody>
      </table></div></div>
    </div>
  </div>
</template>

<script src="assets/data/demo.js"></script>
<script src="assets/js/app.js"></script>
<script>
  const S=window.Soltessa; S.mount({active:'service'});
  const SC=S.scope(); const commName = SC.isAll ? null : SC.dev.name;
  const tkData = DEMO.byComm(DEMO.serviceTickets, commName);
  const openCount = tkData.filter(t=>t.status==='Open').length;

  const kpis=[
    {label:'Open tickets',icon:'inbox',value:String(tkData.length),delta: SC.isAll?'+3 this week':'in this community',d:'flat',s:[9,11,10,12,13,13,14]},
    {label:'Avg resolution',icon:'clock',value:'6.2d',delta:'−0.8d vs last qtr',d:'up',s:[8,7.5,7.1,6.8,6.5,6.3,6.2]},
    {label:'Warranty claims (90d)',icon:'flag',value: SC.isAll?'31':String(tkData.length*3+2),delta:'tile & grout leading',d:'flat',s:[22,25,27,28,30,30,31]},
    {label:'Avg callback rate',icon:'trend',value:'3.4%',delta:'company-wide · all subs',d:'down',s:[5.1,4.6,4.2,3.9,3.6,3.5,3.4]},
  ];
  document.getElementById('kpis').innerHTML=kpis.map(k=>`<div class="kpi"><div class="kpi-label">${S.icon(k.icon)} ${k.label}</div><div class="kpi-value">${k.value}</div><div class="kpi-delta ${k.d}">${k.delta}</div>${S.spark(k.s)}</div>`).join('');

  const tkBadge = s => ({Open:'danger',Scheduled:'warn','In progress':'warn','Awaiting parts':'info'}[s]||'neutral');
  const tickets = tkData.map(t => [t.id, `${t.id} · ${t.buyer.split(' ').pop()}`, t.cat, t.crew, t.age, `<span class="badge ${tkBadge(t.status)}"><span class="d"></span>${t.status}`, t.comm]);
  document.getElementById('tickets').innerHTML = tickets.length ? tickets.map(t=>`<tr data-drawer="woDrawer" data-wo="${t[0]}"><td class="primary">${t[1]}</td><td><span class="tag">${t[2]}</span></td><td class="muted">${t[3]}</td><td class="num right muted">${t[4]}</td><td>${t[5]}</span></td></tr>`).join('') : `<tr><td colspan="5" class="muted" style="text-align:center;padding:24px">No open service requests in this development.</td></tr>`;

  const ct=[['Tile & grout',9,'danger'],['Cabinetry',7,'warn'],['Flooring — plank',6,'warn'],['Carpet',5,'info'],['Countertops',4,'info']];
  const ctMax=9;
  document.getElementById('calltypes').innerHTML=ct.map(c=>`
    <div><div class="flex between fs-13 mb-4"><span class="fw-600">${c[0]}</span><span class="t-mono muted">${c[1]}</span></div>
    <div class="allow-track"><div class="allow-fill ${c[2]==='danger'?'over':c[2]==='warn'?'warn':''}" style="width:${Math.round(c[1]/ctMax*100)}%"></div></div></div>`).join('');

  const homesAll=[
    ['Raj &amp; Priya Patel','Lot 14 · Acacia 2210','—','In production','1','<span class="badge accent"><span class="d"></span>Pre-close','Sienna Pass'],
    ['The Cortez family','Lot 02 · Acacia 2210','Apr 18, 2026','Apr 18, 2027','2','<span class="badge ok"><span class="d"></span>Under warranty','Sienna Pass'],
    ['Elena Vasquez','Lot 17 · Sabino 2640','—','In production','1','<span class="badge accent"><span class="d"></span>Pre-close','Sienna Pass'],
    ['Marcus Webb','Lot 22 · Mesquite 3120','Mar 02, 2026','Mar 02, 2027','3','<span class="badge ok"><span class="d"></span>Under warranty','Desert Vista'],
    ['The Nguyen family','Lot 09 · Ocotillo 1980','Feb 11, 2026','Feb 11, 2027','1','<span class="badge ok"><span class="d"></span>Under warranty','Cholla Ridge'],
    ['The Diaz family','Lot 11 · Ocotillo 1980','Aug 14, 2025','Aug 14, 2026','1','<span class="badge warn"><span class="d"></span>Expiring &lt;60d','Cholla Ridge'],
    ['The Patterson family','Lot 05 · Acacia 2210','Jan 09, 2025','Jan 09, 2026','4','<span class="badge neutral"><span class="d"></span>Expired','Aspen Meadows'],
  ];
  const homes = commName ? homesAll.filter(h=>h[6]===commName) : homesAll;
  document.getElementById('homes').innerHTML = homes.length ? homes.map(h=>`<tr><td class="primary">${h[0]}</td><td class="muted">${h[1]}</td><td class="num right muted">${h[2]}</td><td class="num right">${h[3]}</td><td class="num right">${h[4]}</td><td>${h[5]}</span></td></tr>`).join('') : `<tr><td colspan="6" class="muted" style="text-align:center;padding:24px">No homeowner records in this development.</td></tr>`;

  const agingBadge = age => { const d=parseInt(age); return d>=12?'<span class="badge danger"><span class="d"></span>Overdue':d>=8?'<span class="badge warn"><span class="d"></span>Aging':'<span class="badge info"><span class="d"></span>On track'; };
  const issuedDate = { '12 days':'Jun 17','8 days':'Jun 21','5 days':'Jun 24','3 days':'Jun 26','2 days':'Jun 27' };
  const aging = tkData.slice().sort((a,b)=>parseInt(b.age)-parseInt(a.age)).map(t => [t.id, `${t.buyer.split(' ').pop()} · ${t.lot||''}`.replace(' · ',' · Lot '), t.crew, t.cat, issuedDate[t.age]||'—', t.age.replace(' days','d'), agingBadge(t.age)]);
  document.getElementById('aging').innerHTML = aging.length ? aging.map(a=>`<tr data-drawer="woDrawer" data-wo="${a[0]}"><td class="primary">${a[0]}</td><td class="muted">${a[1]}</td><td>${a[2]}</td><td class="muted">${a[3]}</td><td class="num right muted">${a[4]}</td><td class="num right fw-600">${a[5]}</td><td>${a[6]}</span></td></tr>`).join('') : `<tr><td colspan="7" class="muted" style="text-align:center;padding:24px">No work orders in this development.</td></tr>`;

  const perf=[
    ['Premier Floors','Flooring','38','2','5.3%','4.1d','<span class="badge ok"><span class="d"></span>Good'],
    ['TileRight','Tile','29','4','13.8%','7.2d','<span class="badge danger"><span class="d"></span>Review'],
    ['Vegas Cabinet Co','Cabinets','21','1','4.8%','3.6d','<span class="badge ok"><span class="d"></span>Good'],
    ['StoneWorks','Countertops','18','1','5.6%','6.0d','<span class="badge warn"><span class="d"></span>Watch'],
  ];
  document.getElementById('perf').innerHTML=perf.map(p=>`<tr data-pidx="${perf.indexOf(p)}"><td class="primary">${p[0]}</td><td><span class="tag">${p[1]}</span></td><td class="num right">${p[2]}</td><td class="num right">${p[3]}</td><td class="num right fw-600" style="color:${parseFloat(p[4])>10?'var(--danger)':'var(--ink)'}">${p[4]}</td><td class="num right muted">${p[5]}</td><td>${p[6]}</span></td></tr>`).join('');

  // ============ INTERACTIVITY ============
  // Log service request
  document.querySelector('.page-head .btn.primary').addEventListener('click', () => S.modal({
    eyebrow:'Customer service', title:'Log a service request',
    body:`<div class="form-grid">
      <label class="field"><span class="field-lbl">Homeowner</span><input data-field="home" placeholder="e.g. The Cortez family"/></label>
      <label class="field"><span class="field-lbl">Lot</span><input data-field="lot" placeholder="Lot 02 · Sienna Pass"/></label>
      <label class="field"><span class="field-lbl">Call type</span><select data-field="cat"><option>Tile & grout</option><option>Cabinetry</option><option>Flooring — plank</option><option>Carpet</option><option>Countertops</option></select></label>
      <label class="field"><span class="field-lbl">Assign to</span><select data-field="sub"><option>TileRight</option><option>Premier Floors</option><option>Vegas Cabinet Co</option><option>StoneWorks</option></select></label>
      <label class="field span-2"><span class="field-lbl">Description</span><input data-field="desc" placeholder="Describe the issue…"/></label>
    </div>`,
    actions:[{label:'Cancel',kind:'ghost'},{label:'Create work order',kind:'primary',icon:'check',onClick:(m)=>{const f=S.readForm(m);S.toast(`Work order created for ${f.home||'homeowner'} — assigned to ${f.sub} (demo).`);}}] }));

  // perf rows → detail
  document.querySelectorAll('#perf tr').forEach((tr,i)=>{ tr.classList.add('tbl-clickable'); tr.addEventListener('click',()=>{
    const p=perf[i]; const flag=parseFloat(p[4])>10;
    S.drawer({ eyebrow:'Subcontractor performance', title:p[0], width:480,
      body:`<div class="meta-list mb-16">
        <div class="ml-row"><span class="ml-k">Category</span><span class="ml-v"><span class="tag">${p[1]}</span></span></div>
        <div class="ml-row"><span class="ml-k">Jobs (90d)</span><span class="ml-v t-mono">${p[2]}</span></div>
        <div class="ml-row"><span class="ml-k">Callbacks</span><span class="ml-v t-mono">${p[3]}</span></div>
        <div class="ml-row"><span class="ml-k">Callback rate</span><span class="ml-v t-mono" style="color:${flag?'var(--danger)':'var(--ink)'}">${p[4]}</span></div>
        <div class="ml-row"><span class="ml-k">Avg close</span><span class="ml-v t-mono">${p[5]}</span></div>
      </div>
      <div class="notice ${flag?'danger':'info'}" style="${flag?'background:var(--danger-bg);border-color:#e8c4bf;color:var(--danger)':''}"><span data-ic="${flag?'alert':'info'}"></span><div>${flag?'Callback rate is an outlier — flag for review and weight down in bid awarding.':'Performance within range. Feeds bid awarding and supplier records.'}</div></div>
      <div class="flex gap-8 mt-16">${flag?'<button class="btn primary sm" data-toast="Flagged for review (demo)." style="background:var(--danger);border-color:var(--danger)">'+S.icon('flag')+'Flag for review</button>':''}<button class="btn ghost sm" data-drawer-close>Close</button></div>` });
  });});

  // homeowner rows → service record
  document.querySelectorAll('#homes tr').forEach((tr)=>tr.addEventListener('click',()=>{
    const home = tr.querySelector('.primary').textContent;
    const lot = tr.children[1].textContent;
    S.drawer({ eyebrow:'Homeowner / lot service record', title:home, width:500,
      body:`<div class="meta-list mb-16">
        <div class="ml-row"><span class="ml-k">Lot / Plan</span><span class="ml-v">${lot}</span></div>
        <div class="ml-row"><span class="ml-k">Coverage</span><span class="ml-v">${tr.children[5].textContent.trim()}</span></div>
        <div class="ml-row"><span class="ml-k">Requests to date</span><span class="ml-v t-mono">${tr.children[4].textContent.trim()}</span></div>
      </div>
      <div class="notice info"><span data-ic="info"></span><div>One master record per home for post-close reference — links every service ticket, PO, and warranty item.</div></div>
      <div class="flex gap-8 mt-16"><button class="btn primary sm" data-toast="New request logged (demo).">${S.icon('plus')}Log request</button><button class="btn ghost sm" data-drawer-close>Close</button></div>` });
  }));

  // work order drawer detail
  const woData={
    'WO-1042':{home:'Raj &amp; Priya Patel',lot:'Lot 14 · Sienna Pass',plan:'Acacia 2210',cat:'Tile &amp; grout',sub:'TileRight',issued:'Jun 26, 2026',age:'3 days',status:'Open',desc:'Hairline grout cracking along primary bath shower curb. Reported at 11-month walkthrough.',po:'PO-3319 (tile install)'},
    'WO-1039':{home:'The Cortez family',lot:'Lot 02 · Sienna Pass',plan:'Acacia 2210',cat:'Cabinetry',sub:'Vegas Cabinet Co',issued:'Jun 24, 2026',age:'5 days',status:'Scheduled',desc:'Upper cabinet door misaligned in kitchen; hinge adjustment needed.',po:'PO-3320 (cabinet set)'},
    'WO-1036':{home:'Elena Vasquez',lot:'Lot 17 · Desert Vista',plan:'Sabino 2640',cat:'Flooring — plank',sub:'Premier Floors',issued:'Jun 21, 2026',age:'8 days',status:'In progress',desc:'LVP plank lifting near patio threshold; re-adhere and inspect subfloor.',po:'PO-3312 (flooring)'},
    'WO-1031':{home:'Marcus Webb',lot:'Lot 22 · Cholla Ridge',plan:'Mesquite 3120',cat:'Countertops',sub:'StoneWorks',issued:'Jun 17, 2026',age:'12 days',status:'Awaiting parts',desc:'Visible seam separation at island; replacement slab section on order.',po:'PO-3315 (countertops)'},
    'WO-1028':{home:'The Nguyen family',lot:'Lot 09 · Desert Vista',plan:'Ocotillo 1980',cat:'Carpet',sub:'Premier Floors',issued:'Jun 27, 2026',age:'2 days',status:'Open',desc:'Carpet seam lifting in primary bedroom; re-seam required.',po:'PO-3315 (carpet)'},
  };
  function fillWO(id){
    const w=woData[id]||woData['WO-1042'];
    document.getElementById('woTitle').textContent=id;
    document.getElementById('woBody').innerHTML=`
      <div class="lineage condensed mb-16">
        <div class="lineage-step done"><span class="ls-num"><span data-ic="check"></span></span><span class="ls-label">Lot</span></div><span class="lineage-sep"></span>
        <div class="lineage-step done"><span class="ls-num"><span data-ic="check"></span></span><span class="ls-label">Schedule</span></div><span class="lineage-sep"></span>
        <div class="lineage-step current"><span class="ls-num">9</span><span class="ls-label">Service</span></div>
      </div>
      <dl class="meta mb-16">
        <dt>Homeowner</dt><dd>${w.home}</dd>
        <dt>Lot / Plan</dt><dd>${w.lot} · ${w.plan}</dd>
        <dt>Call type</dt><dd><span class="tag">${w.cat}</span></dd>
        <dt>Subcontractor</dt><dd>${w.sub}</dd>
        <dt>Source PO</dt><dd>${w.po}</dd>
        <dt>Issued</dt><dd>${w.issued} · <span class="fw-600">${w.age}</span></dd>
        <dt>Status</dt><dd><span class="badge ${ {Open:'danger','Scheduled':'warn','In progress':'warn','Awaiting parts':'info'}[w.status]||'danger' }"><span class="d"></span>${w.status}</span></dd>
      </dl>
      <div class="divider"><span class="lbl">Request detail</span><span class="line"></span></div>
      <p class="fs-13 muted mb-16" style="line-height:1.6">${w.desc}</p>
      <div class="notice info"><span data-ic="info"></span><div>Work order generated to <strong>${w.sub}</strong> from the homeowner record — no manual re-keying. Completion tracked back to subcontractor performance.</div></div>
      <div class="flex gap-8 mt-16"><button class="btn primary" data-toast="Work order sent to ${w.sub} (demo)."><span data-ic="send"></span>Send to sub</button><button class="btn ghost" data-toast="${id} marked resolved (demo)." data-drawer-close><span data-ic="check"></span>Mark resolved</button></div>`;
    S.resolveIcons(document.getElementById('woBody'));
  }

  // tabs
  document.querySelectorAll('#tabs button').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('#tabs button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    const t=b.dataset.tab;
    document.querySelectorAll('[data-panel]').forEach(p=>p.style.display=p.dataset.panel===t?'':'none');
  }));

  // drawer wiring for dynamically added rows
  document.querySelectorAll('[data-drawer="woDrawer"]').forEach(r=>r.addEventListener('click',()=>{fillWO(r.dataset.wo);S.openDrawer('woDrawer');}));
</script>
</body>
</html>
