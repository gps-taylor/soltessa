<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lots & Communities · Soltessa</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
<div id="app" data-page="lots"></div>
<div class="drawer-scrim" id="scrim"></div>

<!-- Lot detail drawer — the convergence point -->
<div class="drawer" id="lotDrawer" style="width:560px">
  <div class="drawer-head">
    <div>
      <div class="eyebrow" style="margin:0">Lot detail · convergence point</div>
      <h3 class="t-display" style="font-size:21px;margin-top:4px">Lot 14 · Sienna Pass</h3>
      <div class="muted fs-13">Acacia 2210 · Raj & Priya Patel</div>
    </div>
    <button class="top-action btn-icon" data-drawer-close data-ic="x" aria-label="Close"></button>
  </div>
  <div class="drawer-body" id="lotBody"></div>
</div>

<template id="page">
  <div class="page-head">
    <div class="page-head-row">
      <div>
        <div class="eyebrow">Module 6 · The convergence hub <span class="prov assm">assumption — confirm vs LogicLot</span></div>
        <h1 class="page-title">Lots & Communities</h1>
        <p class="page-sub">Track communities and lots, and tie each home to its selections, quotes, POs, schedule, and service. The lot detail view is where the whole lineage converges.</p>
      </div>
      <div class="seg" id="view"><button class="active">Site map</button><button>Table</button></div>
    </div>
  </div>

  <!-- community summary -->
  <div class="kpi-grid mb-16" id="comm"></div>

  <div class="grid grid-2-1">
    <!-- interactive site map -->
    <div class="card">
      <div class="card-head">
        <div class="card-title"><span data-ic="map"></span>Sienna Pass — interactive site map</div>
        <div class="flex gap-12" style="font-size:11.5px">
          <span class="flex items-center gap-8"><span class="lot-cell available" style="width:14px;height:14px;aspect-ratio:auto"></span>Available</span>
          <span class="flex items-center gap-8"><span class="lot-cell reserved" style="width:14px;height:14px;aspect-ratio:auto"></span>Reserved</span>
          <span class="flex items-center gap-8"><span class="lot-cell sold" style="width:14px;height:14px;aspect-ratio:auto"></span>Sold</span>
          <span class="flex items-center gap-8"><span class="lot-cell production" style="width:14px;height:14px;aspect-ratio:auto"></span>Production</span>
          <span class="flex items-center gap-8"><span class="lot-cell closed" style="width:14px;height:14px;aspect-ratio:auto"></span>Closed</span>
        </div>
      </div>
      <div class="card-body">
        <div class="lotmap" id="map"></div>
      </div>
    </div>

    <!-- community list -->
    <div class="card">
      <div class="card-head"><div class="card-title"><span data-ic="lots"></span>Communities</div></div>
      <div class="card-body flush"><div class="tbl-wrap"><table class="tbl tbl-clickable">
        <thead><tr><th>Community</th><th class="right">Lots</th></tr></thead><tbody id="clist"></tbody>
      </table></div></div>
    </div>
  </div>

  <div class="divider"><span class="lbl">Lot inventory</span><span class="line"></span></div>
  <div class="card">
    <div class="card-body flush"><div class="tbl-wrap"><table class="tbl tbl-clickable" id="lottbl">
      <thead><tr><th>Lot</th><th>Plan</th><th>Buyer</th><th class="right">Premium</th><th>Stage</th><th class="right">Status</th></tr></thead>
      <tbody id="lots"></tbody>
    </table></div></div>
  </div>
</template>

<script src="assets/data/demo.js"></script>
<script src="assets/js/app.js"></script>
<script>
  const S=window.Soltessa; S.mount({active:'lots'});

  // community KPIs
  document.getElementById('comm').innerHTML = DEMO.communities.map(c=>{
    const sold=c.status.sold+c.status.production+c.status.closed;
    return `<div class="kpi"><div class="kpi-label">${S.icon('pin')} ${c.name}</div>
      <div class="kpi-value">${c.lots}<small> lots</small></div>
      <div class="kpi-delta flat">${c.city} · ${sold} committed</div></div>`;
  }).join('');

  // site map (48 cells matching Sienna Pass)
  const statuses=[];
  const st=DEMO.communities[0].status;
  Object.entries(st).forEach(([k,n])=>{ for(let i=0;i<n;i++) statuses.push(k); });
  document.getElementById('map').innerHTML=statuses.map((s,i)=>{
    const isLot14 = i===13;
    return `<div class="lot-cell ${s}" ${isLot14?'data-drawer="lotDrawer" style="outline:2px solid var(--accent);outline-offset:1px"':''} title="Lot ${i+1} · ${s}">${i+1}</div>`;
  }).join('');

  // community list
  document.getElementById('clist').innerHTML=DEMO.communities.map(c=>`
    <tr><td><div class="primary">${c.name}</div><div class="muted">${c.builder}</div></td>
    <td class="num right">${c.lots}<div class="muted">${c.city.split(',')[0]}</div></td></tr>`).join('');

  // lot table
  const lots=[
    ['Lot 14','Acacia 2210','Raj & Priya Patel','$18,000','<span class="badge accent"><span class="d"></span>Production','production'],
    ['Lot 09','Ocotillo 1980','The Nguyen family','$12,500','<span class="badge info"><span class="d"></span>Sold','sold'],
    ['Lot 17','Sabino 2640','Elena Vasquez','$22,000','<span class="badge accent"><span class="d"></span>Production','production'],
    ['Lot 22','Mesquite 3120','Marcus Webb','$26,500','<span class="badge info"><span class="d"></span>Sold','sold'],
    ['Lot 31','Mesquite 3120','Sofia & Aaron Klein','$24,000','<span class="badge info"><span class="d"></span>Sold','sold'],
    ['Lot 02','Acacia 2210','The Cortez family','$15,500','<span class="badge ok"><span class="d"></span>Closed','closed'],
    ['Lot 05','Acacia 2210','The Patterson family','$14,000','<span class="badge warn"><span class="d"></span>Reserved','reserved'],
    ['Lot 41','Sabino 2640','—','$19,500','<span class="badge neutral">Available','available'],
  ];
  const lbl=(s)=>({production:'production',sold:'sold',closed:'closed',reserved:'reserved',available:'available'}[s]);
  document.getElementById('lots').innerHTML=lots.map(r=>`
    <tr ${r[0]==='Lot 14'?'data-drawer="lotDrawer"':''}>
      <td class="primary">${r[0]}</td><td>${r[1]}</td><td class="muted">${r[2]}</td>
      <td class="num tnum">${r[3]}</td><td>${r[4]}</span></td>
      <td class="right"><span class="badge ${ {production:'accent',sold:'info',closed:'ok',reserved:'warn',available:'neutral'}[r[5]] }"><span class="d"></span>${r[5][0].toUpperCase()+r[5].slice(1)}</span></td></tr>`).join('');

  // ---- lot detail body: full lineage ----
  document.getElementById('lotBody').innerHTML = `
    <div class="lineage" style="margin-bottom:18px;flex-wrap:nowrap">
      ${['Plan','Selection','Price Req','Quote','Contract','POs','Lot','Schedule','Service'].map((l,i)=>{
        const done=i<6, cur=i===6;
        return `<div class="lineage-step ${done?'done':cur?'current':''}" style="padding:6px 9px"><span class="ls-num">${String(i+1).padStart(2,'0')}</span><span class="ls-label fs-12">${l}</span></div>${i<8?'<span class="lineage-sep">'+S.icon('chevronR')+'</span>':''}`;
      }).join('')}
    </div>

    <div class="meta" style="margin-bottom:18px">
      <dt>Plan</dt><dd>Acacia 2210 · 2,210 sq ft</dd>
      <dt>Buyer</dt><dd>Raj & Priya Patel</dd>
      <dt>Premium</dt><dd class="t-mono">$18,000</dd>
      <dt>Stage</dt><dd><span class="badge accent"><span class="d"></span>In production</span></dd>
      <dt>Close date</dt><dd>Sept 18, 2026</dd>
    </div>

    <div class="divider"><span class="lbl">Selections & colors</span><span class="line"></span></div>
    <table class="tbl"><tbody>
      <tr><td><div class="cell-lead"><span class="swatch swatch-sm" style="background:#c9a878"></span><span class="primary">White Oak — Natural</span></div></td><td class="num tnum">422 sq ft</td></tr>
      <tr><td><div class="cell-lead"><span class="swatch swatch-sm" style="background:#ede9e0"></span><span class="primary">Quartz — Calacatta Gold</span></div></td><td class="num tnum">64 sq ft</td></tr>
      <tr><td><div class="cell-lead"><span class="swatch swatch-sm" style="background:#efeae1"></span><span class="primary">Shaker Maple — Pure White</span></div></td><td class="num tnum">38 lin ft</td></tr>
    </tbody></table>

    <div class="divider"><span class="lbl">Purchase orders</span><span class="line"></span></div>
    <table class="tbl"><tbody>
      <tr><td class="t-mono">PO-3318 · Daltile</td><td class="right"><span class="badge ok"><span class="d"></span>Received</span></td></tr>
      <tr><td class="t-mono">PO-3319 · Shaw</td><td class="right"><span class="badge info"><span class="d"></span>Acknowledged</span></td></tr>
      <tr><td class="t-mono">PO-3320 · KraftMaid</td><td class="right"><span class="badge info"><span class="d"></span>Issued</span></td></tr>
    </tbody></table>

    <div class="divider"><span class="lbl">Install schedule</span><span class="line"></span></div>
    <div class="stack gap-12">
      <div class="flex items-center between"><span>Hardwood — great room</span><span class="badge accent"><span class="d"></span>Aug 12</span></div>
      <div class="flex items-center between"><span>Tile — kitchen & baths</span><span class="badge neutral">Aug 19</span></div>
      <div class="flex items-center between"><span>Cabinets & countertops</span><span class="badge neutral">Aug 26</span></div>
    </div>
  `;
  S.resolveIcons(document.getElementById('lotDrawer'));

  // view toggle
  document.querySelectorAll('#view button').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('#view button').forEach(x=>x.classList.remove('active')); b.classList.add('active');
  }));
</script>
</body>
</html>
