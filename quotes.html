<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Selections & Quotes · Soltessa</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
<div id="app" data-page="quotes"></div>
<div class="drawer-scrim" id="scrim"></div>

<template id="page">
  <div class="page-head">
    <div class="page-head-row">
      <div>
        <div class="eyebrow">Module 4 · The transactional pipeline</div>
        <h1 class="page-title">Selections & Quotes</h1>
        <p class="page-sub">Turn a design session into an approved, priced commitment through accountable stages — including the price-request step that legacy tools handle implicitly.</p>
      </div>
      <button class="btn primary"><span data-ic="plus"></span>New price request</button>
    </div>
  </div>

  <div data-scopebar="scoped"></div>

  <!-- workflow stepper -->
  <div class="card mb-16"><div class="card-body" style="padding:16px 20px">
    <div class="stepper">
      <div class="step done"><span class="step-num"><span data-ic="check"></span></span><span class="step-label">Selection</span></div>
      <div class="step-line done"></div>
      <div class="step done"><span class="step-num"><span data-ic="check"></span></span><span class="step-label">Price Request</span></div>
      <div class="step-line done"></div>
      <div class="step current"><span class="step-num">3</span><span class="step-label">Quote</span></div>
      <div class="step-line"></div>
      <div class="step"><span class="step-num">4</span><span class="step-label">Buyer Contract</span></div>
      <div class="step-line"></div>
      <div class="step"><span class="step-num">5</span><span class="step-label">Purchasing</span></div>
    </div>
  </div></div>

  <div class="grid grid-2 mb-16">
    <!-- Price requests -->
    <div class="card">
      <div class="card-head">
        <div><div class="card-title"><span data-ic="tag"></span>Price Requests <span class="prov boss">BOSS</span></div><div class="card-sub">Raised to vendors when a selection needs current or custom pricing</div></div>
        <span class="badge warn"><span class="d"></span>2 open</span>
      </div>
      <div class="card-body flush"><div class="tbl-wrap"><table class="tbl tbl-clickable">
        <thead><tr><th>Request</th><th>Vendor</th><th class="right">Status</th><th class="right">Turnaround</th></tr></thead>
        <tbody id="pr"></tbody>
      </table></div></div>
    </div>

    <!-- Quotes -->
    <div class="card">
      <div class="card-head">
        <div><div class="card-title"><span data-ic="quotes"></span>Quotes <span class="prov boss">BOSS</span></div><div class="card-sub">Formal priced quotes issued for builder/buyer approval</div></div>
        <span class="badge info"><span class="d"></span>$182k in flight</span>
      </div>
      <div class="card-body flush"><div class="tbl-wrap"><table class="tbl tbl-clickable">
        <thead><tr><th>Quote</th><th>Lot</th><th class="right">Amount</th><th class="right">Status</th></tr></thead>
        <tbody id="qt"></tbody>
      </table></div></div>
    </div>
  </div>

  <!-- Buyer selections register -->
  <div class="card">
    <div class="card-head">
      <div class="card-title"><span data-ic="list"></span>Buyer Selections register</div>
      <div class="tbl-tools" data-target="#reg" data-filter-scope>
        <span class="fchip active" data-match="all"><span data-ic="filter"></span>All stages</span>
        <span class="fchip" data-match="Sienna Pass">Sienna Pass</span>
        <span class="fchip" data-match="Desert Vista">Desert Vista</span>
      </div>
    </div>
    <div class="card-body flush"><div class="tbl-wrap"><table class="tbl tbl-clickable">
      <thead><tr><th>Buyer</th><th>Lot / Community</th><th>Plan</th><th>Designer</th><th>Stage</th><th class="right">Over allowance</th></tr></thead>
      <tbody id="reg"></tbody>
    </table></div></div>
  </div>
</template>

<script src="assets/data/demo.js"></script>
<script src="assets/js/app.js"></script>
<script>
  const S=window.Soltessa; S.mount({active:'quotes'});
  const SC = S.scope();
  const commName = SC.isAll ? null : SC.dev.name;
  const showComm = SC.isAll; // show community column only in all-dev view

  // Price requests (scoped)
  const prData = DEMO.byComm(DEMO.priceRequests, commName);
  const prBadge = s => s==='Awaiting'?'<span class="badge warn"><span class="d"></span>Awaiting':s==='Answered'?'<span class="badge ok"><span class="d"></span>Answered':'<span class="badge neutral">Expired';
  const pr = prData.map(p => [`${p.id} · ${p.item}`, p.vendor, prBadge(p.status), p.turn]);
  document.getElementById('pr').innerHTML = pr.length ? pr.map(r=>`<tr><td class="primary">${r[0]}</td><td class="muted">${r[1]}</td><td class="right">${r[2]}</span></td><td class="num right muted">${r[3]}</td></tr>`).join('') : emptyRow(4);

  // Quotes (scoped)
  const qtData = DEMO.byComm(DEMO.quotes, commName);
  const money = n => '$'+n.toLocaleString();
  const qBadge = s => s==='Approved'?'<span class="badge ok"><span class="d"></span>Approved':s==='Draft'?'<span class="badge accent"><span class="d"></span>Draft':'<span class="badge info"><span class="d"></span>Pending';
  const qt = qtData.map(q => [q.id, `${q.lot} · ${q.comm}`, money(q.amount), qBadge(q.status)]);
  document.getElementById('qt').innerHTML = qt.length ? qt.map(r=>`<tr><td class="primary t-mono">${r[0]}</td><td class="muted">${r[1]}</td><td class="num tnum primary">${r[2]}</td><td class="right">${r[3]}</span></td></tr>`).join('') : emptyRow(4);

  // Buyer selections register (scoped) — derived from buyers
  const regData = DEMO.byComm(DEMO.buyers, commName);
  const stageBadge = st => ({production:'<span class="badge neutral">PO issued',escrow:'<span class="badge info"><span class="d"></span>Quote',contingency:'<span class="badge warn"><span class="d"></span>Price Request',closed:'<span class="badge ok"><span class="d"></span>Contract',selection:'<span class="badge accent"><span class="d"></span>Selection'}[st]||'<span class="badge accent"><span class="d"></span>Selection');
  const reg = regData.map(b => [b.name, `${b.lot} · ${b.comm}`, b.plan, b.designer, stageBadge(b.status), b.over?('+$'+b.over.toLocaleString()):'$0']);

  function emptyRow(cols){ return `<tr><td colspan="${cols}" class="muted" style="text-align:center;padding:24px">No items in this development.</td></tr>`; }

  // dynamic in-flight badge
  const inFlight = qtData.filter(q=>q.status!=='Approved').reduce((s,q)=>s+q.amount,0);
  const qtFlightBadge = document.querySelector('#qt')?.closest('.card')?.querySelector('.card-head .badge');
  if (qtFlightBadge) qtFlightBadge.innerHTML = `<span class="d"></span>$${Math.round(inFlight/1000)}k in flight`;
  const prOpen = prData.filter(p=>p.status==='Awaiting').length;
  const prOpenBadge = document.querySelector('#pr')?.closest('.card')?.querySelector('.card-head .badge');
  if (prOpenBadge) prOpenBadge.innerHTML = `<span class="d"></span>${prOpen} open`;

  document.getElementById('reg').innerHTML=reg.map(r=>{
    const over=r[5]!=='$0';
    return `<tr><td class="primary">${r[0]}</td><td class="muted">${r[1]}</td><td>${r[2]}</td><td class="muted">${r[3]}</td><td>${r[4]}</span></td><td class="num tnum right" style="color:${over?'var(--danger)':'var(--ink-3)'}">${r[5]}</td></tr>`;
  }).join('');

  // ============ INTERACTIVITY ============
  // New price request
  document.querySelector('.page-head .btn.primary').addEventListener('click', () => S.modal({
    eyebrow:'Selections & Quotes', title:'Raise a price request',
    body:`<p class="modal-intro">Request current or custom pricing from a vendor for a selected item.</p>
      <div class="form-grid">
        <label class="field span-2"><span class="field-lbl">Item / description</span><input data-field="item" placeholder="e.g. Calacatta Gold quartz — custom edge"/></label>
        <label class="field"><span class="field-lbl">Vendor</span><select data-field="vendor"><option>Cambria</option><option>Daltile</option><option>Mohawk</option><option>Shaw</option><option>KraftMaid</option><option>MSI</option></select></label>
        <label class="field"><span class="field-lbl">Lot</span><input data-field="lot" placeholder="Lot 22 · Desert Vista"/></label>
        <label class="field span-2"><span class="field-lbl">Needed by</span><input data-field="due" placeholder="e.g. Jul 8"/></label>
      </div>`,
    actions:[{label:'Cancel',kind:'ghost'},{label:'Send request',kind:'primary',icon:'send',onClick:(m)=>{const f=S.readForm(m);S.toast(`Price request sent to ${f.vendor} (demo).`);}}] }));

  // PR rows → detail / record answer
  document.querySelectorAll('#pr tr').forEach((tr,i)=>tr.addEventListener('click',()=>{
    const r=pr[i]; const answered=r[2].includes('Answered');
    S.modal({ eyebrow:'Price request · '+r[1], title:r[0].split('·')[1]?.trim()||r[0],
      body:`<div class="meta-list mb-16">
        <div class="ml-row"><span class="ml-k">Request</span><span class="ml-v t-mono">${r[0].split('·')[0].trim()}</span></div>
        <div class="ml-row"><span class="ml-k">Vendor</span><span class="ml-v">${r[1]}</span></div>
        <div class="ml-row"><span class="ml-k">Status</span><span class="ml-v">${r[2]}</span></div>
        <div class="ml-row"><span class="ml-k">Turnaround</span><span class="ml-v t-mono">${r[3]}</span></div>
      </div>${answered?'':'<label class="field"><span class="field-lbl">Record returned price</span><input data-field="price" placeholder="e.g. $64.00 / sq ft"/></label>'}`,
      actions: answered ? [{label:'Close',kind:'ghost'},{label:'Use in quote',kind:'primary',icon:'quotes',onClick:()=>S.toast('Price pulled into quote (demo).')}]
        : [{label:'Cancel',kind:'ghost'},{label:'Record answer',kind:'primary',icon:'check',onClick:(m)=>{const f=S.readForm(m);S.toast(`Answer recorded for ${r[1]}${f.price?' — '+f.price:''} (demo).`);}}] });
  }));

  // Quote rows → quote detail w/ approve/send
  document.querySelectorAll('#qt tr').forEach((tr,i)=>tr.addEventListener('click',()=>{
    const q=qt[i]; const status=q[3].replace(/<[^>]+>/g,'').trim();
    S.modal({ eyebrow:q[1], title:'Quote '+q[0], size:'lg',
      body:`<div class="flex between items-center mb-16"><span class="t-display fw-700" style="font-size:24px">${q[2]}</span><span class="badge ${status==='Approved'?'ok':status==='Draft'?'accent':'info'}"><span class="d"></span>${status}</span></div>
        <div class="doc-preview"><table class="tbl"><thead><tr><th>Line</th><th class="right">Qty</th><th class="right">Ext.</th></tr></thead><tbody>
          <tr><td>Hardwood — Great Room</td><td class="num right">422 sq ft</td><td class="num right tnum">$3,355</td></tr>
          <tr><td>Tile — Kitchen + baths</td><td class="num right">414 sq ft</td><td class="num right tnum">$2,301</td></tr>
          <tr><td>Cabinets — Kitchen</td><td class="num right">38 lin ft</td><td class="num right tnum">$8,170</td></tr>
          <tr><td>Countertops — Quartz</td><td class="num right">64 sq ft</td><td class="num right tnum">$4,096</td></tr>
          <tr style="background:var(--accent-bg)"><td class="primary">Total</td><td></td><td class="num right primary tnum">${q[2]}</td></tr>
        </tbody></table></div>`,
      actions: status==='Draft' ? [{label:'Close',kind:'ghost'},{label:'Issue quote',kind:'primary',icon:'send',onClick:()=>S.toast(`Quote ${q[0]} issued to builder (demo).`)}]
        : status==='Approved' ? [{label:'Close',kind:'ghost'},{label:'Generate POs',kind:'primary',icon:'purchasing',onClick:()=>{S.toast('Approved quote → generating POs…');setTimeout(()=>location.href='purchasing.html',900);}}]
        : [{label:'Close',kind:'ghost'},{label:'Mark approved',kind:'primary',icon:'check',onClick:()=>S.toast(`Quote ${q[0]} marked approved (demo).`)}] });
  }));

  // register rows → route by stage
  const regRoute={'Selection':'design-studio.html','Price Request':'quotes.html','Quote':'quotes.html','Contract':'sales.html','PO issued':'purchasing.html'};
  document.querySelectorAll('#reg tr').forEach((tr,i)=>tr.addEventListener('click',()=>{
    const r=reg[i]; const stage=r[4].replace(/<[^>]+>/g,'').trim();
    S.modal({ eyebrow:r[1]+' · '+r[2], title:r[0], size:'sm',
      body:`<div class="meta-list"><div class="ml-row"><span class="ml-k">Designer</span><span class="ml-v">${r[3]}</span></div><div class="ml-row"><span class="ml-k">Stage</span><span class="ml-v">${r[4]}</span></div><div class="ml-row"><span class="ml-k">Over allowance</span><span class="ml-v t-mono" style="color:${r[5]!=='$0'?'var(--danger)':'var(--ink-3)'}">${r[5]}</span></div></div>`,
      actions:[{label:'Close',kind:'ghost'},{label:'Open '+stage,kind:'primary',icon:'arrowR',onClick:()=>location.href=(regRoute[stage]||'lots.html')}] });
  }));
</script>
</body>
</html>
