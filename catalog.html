<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pricing & Catalog · Soltessa</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
<div id="app" data-page="catalog"></div>
<div class="drawer-scrim" id="scrim"></div>

<template id="page">
  <div class="page-head">
    <div class="page-head-row">
      <div>
        <div class="eyebrow">Module 3 · Single source of truth</div>
        <h1 class="page-title">Pricing & Catalog</h1>
        <p class="page-sub">Every product, price, supplier, and what's available to whom. Cost and markup cascade everywhere an item is used. Builder Programs control which products appear for each neighborhood and series.</p>
      </div>
      <div class="flex gap-10">
        <button class="btn"><span data-ic="sliders"></span>Markup vs. margin</button>
        <button class="btn primary"><span data-ic="plus"></span>Add product</button>
      </div>
    </div>
  </div>

  <div class="seg mb-16" id="tabs">
    <button class="active" data-tab="catalog">Price book</button>
    <button data-tab="programs">Builder Programs</button>
    <button data-tab="suppliers">Suppliers & Installers</button>
  </div>

  <!-- PRICE BOOK -->
  <div data-panel="catalog">
    <div class="filterbar" data-target="#cat" data-filter-scope>
      <span class="fchip active" data-match="all"><span data-ic="grid"></span>All categories</span>
      <span class="fchip" data-match="Hardwood">Hardwood</span><span class="fchip" data-match="Tile">Tile</span><span class="fchip" data-match="Carpet">Carpet</span>
      <span class="fchip" data-match="Cabinets">Cabinets</span><span class="fchip" data-match="Countertops">Countertops</span>
      <span style="flex:1"></span>
      <span class="muted fs-12">Showing 12 of 312 SKUs</span>
    </div>
    <div class="card">
      <div class="card-body flush">
        <div class="tbl-wrap"><table class="tbl tbl-clickable">
          <thead><tr><th>Product</th><th>Category</th><th>Supplier</th><th class="right">Cost</th><th class="right">Allowance</th><th class="right">Sell</th><th class="right">Markup</th><th>Unit</th></tr></thead>
          <tbody id="cat"></tbody>
        </table></div>
      </div>
    </div>
    <div class="notice info mt-16"><span data-ic="info"></span><div>Changing a cost or markup here cascades to every open selection, quote, and PO that uses the item. Bulk updates by category or supplier are supported. <span class="prov conf">confirmed</span></div></div>
  </div>

  <!-- BUILDER PROGRAMS -->
  <div data-panel="programs" style="display:none">
    <div class="notice accent mb-16"><span data-ic="info"></span><div><b>Builder Programs</b> are an availability matrix — they define which catalog items and program prices are offered by neighborhood and series, and carry the cutoff rules that filter what a buyer sees in Design Studio. <span class="prov boss">BOSS</span></div></div>
    <div class="card">
      <div class="card-head"><div class="card-title"><span data-ic="catalog"></span>Availability matrix — Sunridge Standard Program</div><span class="badge ok"><span class="d"></span>Active</span></div>
      <div class="card-body flush">
        <div class="tbl-wrap"><table class="tbl">
          <thead><tr><th>Product</th><th class="right">Sienna Pass<br><span class="muted" style="font-weight:400">Acacia / Sabino</span></th><th class="right">Desert Vista<br><span class="muted" style="font-weight:400">Mesquite</span></th><th class="right">Program price</th></tr></thead>
          <tbody id="prog"></tbody>
        </table></div>
      </div>
    </div>
  </div>

  <!-- SUPPLIERS -->
  <div data-panel="suppliers" style="display:none">
    <div class="grid grid-2">
      <div class="card">
        <div class="card-head"><div class="card-title"><span data-ic="box"></span>Suppliers</div></div>
        <div class="card-body flush"><div class="tbl-wrap"><table class="tbl tbl-clickable">
          <thead><tr><th>Supplier</th><th>Terms</th><th>Insurance</th></tr></thead><tbody id="sup"></tbody>
        </table></div></div>
      </div>
      <div class="card">
        <div class="card-head"><div class="card-title"><span data-ic="users"></span>Installers / subcontractors</div></div>
        <div class="card-body flush"><div class="tbl-wrap"><table class="tbl tbl-clickable">
          <thead><tr><th>Crew</th><th>Categories</th><th class="right">Callback rate</th></tr></thead><tbody id="inst"></tbody>
        </table></div></div>
      </div>
    </div>
  </div>
</template>

<script src="assets/data/demo.js"></script>
<script src="assets/js/app.js"></script>
<script>
  const S = window.Soltessa;
  S.mount({ active: 'catalog' });
  const money = n => '$' + n.toLocaleString(undefined,{minimumFractionDigits:n%1?2:0,maximumFractionDigits:2});

  // price book
  document.getElementById('cat').innerHTML = DEMO.catalog.map(c => {
    const markup = Math.round(((c.sell - c.cost)/c.cost)*100);
    return `<tr>
      <td><div class="cell-lead"><span class="swatch swatch-sm" style="background:${c.color}"></span>
        <div><span class="primary">${c.name}</span><div class="muted t-mono">${c.sku}</div></div></div></td>
      <td><span class="tag">${c.cat}</span></td><td class="muted">${c.supplier}</td>
      <td class="num tnum">${money(c.cost)}</td><td class="num tnum muted">${money(c.allow)}</td>
      <td class="num tnum primary">${money(c.sell)}</td>
      <td class="num tnum" style="color:var(--accent-d)">+${markup}%</td>
      <td class="muted">${c.unit}</td></tr>`;
  }).join('');

  // programs availability
  const prog = [
    ['White Oak — Wirebrushed','✓','✓','$7.95 / sq ft'],
    ['Carrara Look Porcelain','✓','✓','$5.40 / sq ft'],
    ['Quartz — Calacatta Gold','✓','—','$64 / sq ft'],
    ['Shaker Maple — White','✓','✓','$215 / lin ft'],
    ['Granite — Ubatuba','—','✓','$49 / sq ft'],
    ['Mohave Plush Carpet','✓','✓','$29.50 / sq yd'],
  ];
  const mark = v => v==='✓' ? '<span class="badge ok"><span class="d"></span>Offered</span>' : '<span class="badge neutral">Not offered</span>';
  document.getElementById('prog').innerHTML = prog.map(p=>`
    <tr><td class="primary">${p[0]}</td><td class="right">${mark(p[1])}</td><td class="right">${mark(p[2])}</td><td class="num tnum primary">${p[3]}</td></tr>`).join('');

  // suppliers
  const sup = [
    ['Daltile','Net 30','<span class="badge ok"><span class="d"></span>Valid → 2027'],
    ['Mohawk','Net 45','<span class="badge ok"><span class="d"></span>Valid → 2026'],
    ['Shaw','Net 30','<span class="badge ok"><span class="d"></span>Valid → 2027'],
    ['Cambria','Net 30','<span class="badge ok"><span class="d"></span>Valid → 2026'],
    ['KraftMaid','Net 60','<span class="badge ok"><span class="d"></span>Valid → 2027'],
    ['MSI','Net 30','<span class="badge warn"><span class="d"></span>Renews 30 days'],
  ];
  document.getElementById('sup').innerHTML = sup.map(s=>`<tr><td class="primary">${s[0]}</td><td class="muted">${s[1]}</td><td>${s[2]}</span></td></tr>`).join('');

  const inst = [
    ['Premier Floors','Hardwood · Carpet · LVP','2.1%'],
    ['TileRight','Tile · Backsplash','1.4%'],
    ['Vegas Cabinet Co','Cabinets','3.8%'],
    ['StoneWorks','Countertops','0.9%'],
  ];
  document.getElementById('inst').innerHTML = inst.map(i=>{
    const r=parseFloat(i[2]); const cls=r>3?'danger':r>2?'warn':'ok';
    return `<tr><td class="primary">${i[0]}</td><td class="muted">${i[1]}</td><td class="right"><span class="badge ${cls}"><span class="d"></span>${i[2]}</span></td></tr>`;
  }).join('');

  // ============ INTERACTIVITY ============
  const hb = document.querySelectorAll('.page-head .btn');
  // Markup vs margin reference
  hb[0].addEventListener('click', () => S.modal({ eyebrow:'Pricing reference', title:'Markup vs. margin', size:'sm',
    body:`<p class="modal-intro">These are distinct calculations. Markup is over <b>cost</b>; margin is of <b>sell price</b>.</p>
      <div class="meta-list">
        <div class="ml-row"><span class="ml-k">Cost</span><span class="ml-v t-mono">$4.85</span></div>
        <div class="ml-row"><span class="ml-k">Sell</span><span class="ml-v t-mono">$7.95</span></div>
        <div class="ml-row"><span class="ml-k">Markup (over cost)</span><span class="ml-v t-mono" style="color:var(--accent-d)">+63.9%</span></div>
        <div class="ml-row"><span class="ml-k">Margin (of sell)</span><span class="ml-v t-mono" style="color:var(--ok)">39.0%</span></div>
      </div>` }));
  // Add product
  hb[1].addEventListener('click', () => S.modal({ eyebrow:'Price book', title:'Add product',
    body:`<div class="form-grid">
      <label class="field span-2"><span class="field-lbl">Product name</span><input data-field="name" placeholder="e.g. European Oak — Matte"/></label>
      <label class="field"><span class="field-lbl">Category</span><select data-field="cat"><option>Hardwood</option><option>Tile</option><option>Carpet</option><option>LVP</option><option>Cabinets</option><option>Countertops</option></select></label>
      <label class="field"><span class="field-lbl">Supplier</span><input data-field="sup" placeholder="e.g. Mohawk"/></label>
      <label class="field"><span class="field-lbl">Cost</span><input data-field="cost" type="number" placeholder="4.85"/></label>
      <label class="field"><span class="field-lbl">Sell</span><input data-field="sell" type="number" placeholder="7.95"/></label>
      <label class="field"><span class="field-lbl">Unit</span><select data-field="unit"><option>sq ft</option><option>sq yd</option><option>lin ft</option><option>unit</option></select></label>
      <label class="field"><span class="field-lbl">Allowance value</span><input data-field="allow" type="number" placeholder="6.20"/></label>
    </div>`,
    actions:[{label:'Cancel',kind:'ghost'},{label:'Add to price book',kind:'primary',icon:'plus',onClick:(m)=>{const f=S.readForm(m);S.toast(`“${f.name||'New product'}” added to the price book (demo).`);}}] }));

  // price-book rows → edit price
  document.querySelectorAll('#cat tr').forEach((tr,i)=>tr.addEventListener('click',()=>{
    const c = DEMO.catalog[i];
    S.modal({ eyebrow:`${c.sku} · ${c.cat}`, title:c.name,
      body:`<p class="modal-intro">Edit pricing. Changes cascade to every open selection, quote, and PO using this item.</p>
        <div class="form-grid">
          <label class="field"><span class="field-lbl">Cost (${c.unit})</span><input data-field="cost" type="number" value="${c.cost}"/></label>
          <label class="field"><span class="field-lbl">Allowance value</span><input data-field="allow" type="number" value="${c.allow}"/></label>
          <label class="field"><span class="field-lbl">Sell price</span><input data-field="sell" type="number" value="${c.sell}"/></label>
          <label class="field"><span class="field-lbl">Supplier</span><input data-field="sup" value="${c.supplier}"/></label>
        </div>
        <div class="notice info mt-16"><span data-ic="info"></span><div>Current markup over cost: <b>+${Math.round(((c.sell-c.cost)/c.cost)*100)}%</b>.</div></div>`,
      actions:[{label:'Cancel',kind:'ghost'},{label:'Save & cascade',kind:'primary',icon:'check',onClick:()=>S.toast(`${c.name} pricing updated — cascaded to all open records (demo).`)}] });
  }));

  // program rows → toggle availability
  document.querySelectorAll('#prog tr').forEach((tr,i)=>{ tr.classList.add('tbl-clickable'); tr.addEventListener('click',()=>{
    const p = prog[i];
    S.modal({ eyebrow:'Builder program · availability', title:p[0], size:'sm',
      body:`<p class="modal-intro">Toggle which neighborhoods offer this product and set program price.</p>
        <div class="form-grid">
          <div class="field span-2"><span class="field-lbl">Offered in</span><div class="chip-set" data-field="hoods"><button class="chip-toggle ${p[1]==='✓'?'on':''}" data-val="Sienna Pass">Sienna Pass</button><button class="chip-toggle ${p[2]==='✓'?'on':''}" data-val="Desert Vista">Desert Vista</button><button class="chip-toggle" data-val="Cholla Ridge">Cholla Ridge</button><button class="chip-toggle" data-val="Aspen Meadows">Aspen Meadows</button></div></div>
          <label class="field span-2"><span class="field-lbl">Program price</span><input data-field="price" value="${p[3]}"/></label>
        </div>`,
      actions:[{label:'Cancel',kind:'ghost'},{label:'Save program',kind:'primary',icon:'check',onClick:()=>S.toast(`Availability updated for ${p[0]} (demo).`)}] });
  });});

  // supplier rows → detail
  document.querySelectorAll('#sup tr').forEach((tr,i)=>tr.addEventListener('click',()=>{
    const s = sup[i];
    S.drawer({ eyebrow:'Supplier record', title:s[0], width:480,
      body:`<div class="meta-list mb-16">
        <div class="ml-row"><span class="ml-k">Payment terms</span><span class="ml-v">${s[1]}</span></div>
        <div class="ml-row"><span class="ml-k">Insurance</span><span class="ml-v">${s[2]}</span></div>
        <div class="ml-row"><span class="ml-k">Open POs</span><span class="ml-v t-mono">${2+i}</span></div>
        <div class="ml-row"><span class="ml-k">Spend YTD</span><span class="ml-v t-mono">$${(40+i*12).toLocaleString()}k</span></div>
      </div>
      <div class="flex gap-8"><button class="btn primary sm" data-toast="Insurance reminder sent (demo).">${S.icon('send')}Request COI</button><button class="btn ghost sm" data-drawer-close>Close</button></div>` });
  }));

  // installer rows → detail
  document.querySelectorAll('#inst tr').forEach((tr,i)=>tr.addEventListener('click',()=>{
    const x = inst[i];
    S.drawer({ eyebrow:'Installer / subcontractor', title:x[0], width:480,
      body:`<div class="meta-list mb-16">
        <div class="ml-row"><span class="ml-k">Categories</span><span class="ml-v">${x[1]}</span></div>
        <div class="ml-row"><span class="ml-k">Callback rate (90d)</span><span class="ml-v t-mono">${x[2]}</span></div>
        <div class="ml-row"><span class="ml-k">Jobs assigned</span><span class="ml-v t-mono">${18+i*6}</span></div>
        <div class="ml-row"><span class="ml-k">Avg close time</span><span class="ml-v t-mono">${(3.6+i).toFixed(1)}d</span></div>
      </div>
      <div class="notice ${parseFloat(x[2])>3?'warn':'info'}"><span data-ic="info"></span><div>Performance feeds bid awarding (Purchasing) and supplier records.</div></div>
      <div class="flex gap-8 mt-16"><button class="btn ghost sm" data-drawer-close>Close</button></div>` });
  }));

  // tabs
  document.querySelectorAll('#tabs button').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('#tabs button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    const t=b.dataset.tab;
    document.querySelectorAll('[data-panel]').forEach(p=>p.style.display=p.dataset.panel===t?'':'none');
  }));
</script>
</body>
</html>
