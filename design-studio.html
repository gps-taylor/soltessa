<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Design Studio · Soltessa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
<div id="app" data-page="studio"></div>
<div class="drawer-scrim" id="scrim"></div>

<!-- Flooring calculator drawer -->
<div class="drawer" id="calcDrawer">
  <div class="drawer-head">
    <div>
      <div class="eyebrow" style="margin:0">Flooring calculator <span class="prov boss">BOSS</span></div>
      <h3 class="t-display" style="font-size:20px;margin-top:4px">Great Room — White Oak</h3>
    </div>
    <button class="top-action btn-icon" data-drawer-close aria-label="Close" data-ic="x"></button>
  </div>
  <div class="drawer-body" id="calcBody"></div>
</div>

<template id="page">
  <div class="page-head">
    <div class="page-head-row">
      <div>
        <div class="eyebrow">Module 2 · The core</div>
        <h1 class="page-title">Design Studio</h1>
        <p class="page-sub">Sit with a buyer and build the finish package room by room, priced live against the builder allowance. Quantities auto-fill from plan dimensions in the right unit for each category.</p>
      </div>
      <div class="flex gap-10">
        <button class="btn"><span data-ic="layers"></span>What-if scenarios</button>
        <button class="btn primary"><span data-ic="plus"></span>New session</button>
      </div>
    </div>
  </div>

  <!-- session context bar -->
  <div class="card mb-16">
    <div class="card-body" style="padding:14px 18px">
      <div class="flex items-center between wrap gap-16">
        <div class="flex items-center gap-16 wrap">
          <div>
            <div class="muted fs-12">Buyer</div>
            <div class="fw-600">Raj & Priya Patel</div>
          </div>
          <div style="width:1px;height:30px;background:var(--line)"></div>
          <div>
            <div class="muted fs-12">Lot</div>
            <div class="fw-600">Lot 14 · Sienna Pass</div>
          </div>
          <div style="width:1px;height:30px;background:var(--line)"></div>
          <div>
            <div class="muted fs-12">Plan</div>
            <div class="fw-600">Acacia 2210 · 3 bd / 2.5 ba</div>
          </div>
          <div style="width:1px;height:30px;background:var(--line)"></div>
          <div>
            <div class="muted fs-12">Stage</div>
            <div class="fw-600"><span class="badge accent"><span class="d"></span>Selections open</span></div>
          </div>
        </div>
        <div class="seg" id="studioTabs">
          <button class="active" data-tab="products">Products</button>
          <button data-tab="colors">Colors</button>
          <button data-tab="takeoffs">Takeoffs</button>
        </div>
      </div>
    </div>
  </div>

  <!-- cutoff notice -->
  <div class="notice warn mb-16">
    <span data-ic="alert"></span>
    <div><b>Cabinet selections close in 6 days.</b> Construction stage on this lot reaches <b>cabinet rough-in</b> on July 5 — cabinet and countertop lines lock at that point. Flooring and tile remain open through drywall. <span class="prov conf" style="margin-left:6px">confirmed</span></div>
  </div>

  <div class="studio">
    <!-- LEFT: room-by-room selection -->
    <div>
      <div data-panel="products"><div id="rooms"></div></div>
      <div data-panel="colors" style="display:none"><div id="colorsPanel"></div></div>
      <div data-panel="takeoffs" style="display:none"><div id="takeoffsPanel"></div></div>
    </div>

    <!-- RIGHT: live allowance panel -->
    <div class="stack gap-16" style="position:sticky;top:78px">
      <div class="card">
        <div class="card-head"><div class="card-title"><span data-ic="dollar"></span>Allowance, live</div></div>
        <div class="card-body">
          <div id="allowLive"></div>
          <div class="doc-rule"></div>
          <div class="flex items-center between">
            <span class="fw-600">Total over allowance</span>
            <span class="t-display fw-700" style="font-size:20px;color:var(--danger)">+$1,040</span>
          </div>
          <p class="muted fs-12" style="margin:8px 0 0">Buyer pays the net difference. Standard finishes are credited automatically.</p>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><div class="card-title"><span data-ic="layers"></span>What-if scenarios <span class="prov conf">confirmed</span></div></div>
        <div class="card-body flush">
          <div id="scenarios"></div>
        </div>
      </div>

      <button class="btn primary" style="width:100%;padding:11px"><span data-ic="check"></span>Finalize selections → Price Request</button>
    </div>
  </div>
</template>

<script src="assets/data/demo.js"></script>
<script src="assets/js/app.js"></script>
<script>
  const S = window.Soltessa;
  S.mount({ active: 'studio' });

  // ---- rooms (room-by-room, per-category unit) ----
  // each room: products with auto-filled qty in correct UoM
  const rooms = [
    { name: 'Great Room', sqft: 384, locked: false, items: [
      { sel: 'White Oak — Wirebrushed', cat: 'Hardwood', unit: 'sq ft', qty: 422, price: 7.95, allowPrice: 6.20, std: 'Builder LVP', calc: true },
    ]},
    { name: 'Kitchen', sqft: 268, locked: false, items: [
      { sel: 'Carrara Look 12×24 Porcelain', cat: 'Tile', unit: 'sq ft', qty: 295, price: 5.40, allowPrice: 4.10, std: 'Builder tile', calc: true },
      { sel: 'Shaker Maple — White', cat: 'Cabinets', unit: 'lin ft', qty: 38, price: 215, allowPrice: 175, std: 'Oak builder', locked: true },
      { sel: 'Quartz — Calacatta Gold', cat: 'Countertops', unit: 'sq ft', qty: 64, price: 64, allowPrice: 52, std: 'Laminate', locked: true },
    ]},
    { name: 'Primary Bedroom', sqft: 246, locked: false, items: [
      { sel: 'Mohave Plush — Greige', cat: 'Carpet', unit: 'sq yd', qty: 30, price: 29.50, allowPrice: 24.00, std: 'Builder carpet', calc: true },
    ]},
    { name: 'Primary Bath', sqft: 132, locked: false, items: [
      { sel: 'Slate Grey 18×18 Porcelain', cat: 'Tile', unit: 'sq ft', qty: 146, price: 4.85, allowPrice: 4.10, std: 'Builder tile', calc: true },
    ]},
    { name: 'Bedrooms 2 & 3', sqft: 302, locked: false, items: [
      { sel: 'Canyon Berber — Sandstone', cat: 'Carpet', unit: 'sq yd', qty: 37, price: 26.80, allowPrice: 24.00, std: 'Builder carpet', calc: true },
    ]},
  ];

  const money = n => '$' + n.toLocaleString(undefined, { minimumFractionDigits: n % 1 ? 2 : 0, maximumFractionDigits: 2 });

  document.getElementById('rooms').innerHTML = rooms.map(room => {
    const rows = room.items.map(it => {
      const ext = it.qty * it.price;
      const net = it.qty * (it.price - it.allowPrice);
      const over = net > 0;
      const lockBadge = it.locked ? '<span class="badge danger" style="margin-left:7px"><span class="d"></span>locks Jul 5</span>' : '';
      const calcBtn = it.calc ? `<button class="btn sm ghost" data-drawer="calcDrawer" title="Open flooring calculator"><span data-ic="calc"></span></button>` : '';
      return `<tr>
        <td>
          <div class="cell-lead">
            <span class="swatch swatch-sm" style="background:${swatchFor(it.cat)}"></span>
            <div><span class="primary">${it.sel}</span><div class="muted">${it.cat} · net over std: <b style="color:${over?'var(--danger)':'var(--ok)'}">${over?'+':''}${money(net)}</b></div></div>
          </div>
        </td>
        <td class="num tnum">${it.qty.toLocaleString()}<div class="muted" style="font-weight:400">${it.unit}</div></td>
        <td class="num tnum">${money(it.price)}</td>
        <td class="num tnum primary">${money(ext)}</td>
        <td class="right" style="white-space:nowrap">${calcBtn}</td>
      </tr>`;
    }).join('');
    return `<div class="room-group">
      <div class="room-head">
        <div class="rn"><span data-ic="home"></span>${room.name}</div>
        <div class="rd">${room.sqft} sq ft floor area</div>
      </div>
      <div class="tbl-wrap"><table class="tbl">
        <thead><tr><th>Selection</th><th class="right">Qty</th><th class="right">Unit price</th><th class="right">Extended</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
  }).join('');

  function swatchFor(cat) {
    const m = { Hardwood:'#c9a878', Tile:'#e6e4df', Carpet:'#bcb3a4', Cabinets:'#efeae1', Countertops:'#ede9e0', LVP:'#a8916f' };
    return m[cat] || '#ddd';
  }

  // ---- live allowance ----
  const live = [
    { cat: 'Flooring', used: 15240, cap: 14200 },
    { cat: 'Cabinets', used: 8170, cap: 9800 },
    { cat: 'Countertops', used: 4096, cap: 6400 },
  ];
  document.getElementById('allowLive').innerHTML = live.map(a => {
    const pct = Math.min(100, (a.used / a.cap) * 100);
    const over = a.used > a.cap, warn = !over && pct > 88;
    const cls = over ? 'over' : (warn ? 'warn' : '');
    const delta = a.used - a.cap;
    return `<div style="margin-bottom:14px">
      <div class="allow-row"><span class="cat">${a.cat}</span>
        <span class="delta ${over?'over':'under'}">${over?'+':''}${money(delta)}</span></div>
      <div class="allow-track"><div class="allow-fill ${cls}" style="width:${pct}%"></div></div>
      <div class="muted fs-12 tnum" style="margin-top:4px">${money(a.used)} / ${money(a.cap)}</div>
    </div>`;
  }).join('');

  // ---- scenarios ----
  const scen = [
    { name: 'Upgraded kitchen', total: '+$1,040', active: true },
    { name: 'Builder-grade baseline', total: '$0', active: false },
    { name: 'Full premium package', total: '+$4,820', active: false },
  ];
  document.getElementById('scenarios').innerHTML = scen.map((s,i) => `
    <div class="flex items-center between" style="padding:12px 16px;border-bottom:${i<scen.length-1?'1px solid var(--line)':'none'};${s.active?'background:var(--accent-bg)':''}">
      <div class="flex items-center gap-10">
        <span style="width:16px;height:16px;border-radius:50%;border:2px solid ${s.active?'var(--accent)':'var(--line-2)'};display:grid;place-items:center">
          ${s.active?'<span style="width:7px;height:7px;border-radius:50%;background:var(--accent)"></span>':''}
        </span>
        <span class="fw-600 fs-13">${s.name}</span>
      </div>
      <span class="t-mono fs-12 ${s.total.startsWith('+')?'':''}" style="color:${s.total.startsWith('+')?'var(--danger)':'var(--ink-3)'}">${s.total}</span>
    </div>`).join('');

  // ---- flooring calculator drawer body ----
  document.getElementById('calcBody').innerHTML = `
    <p class="muted fs-13" style="margin-top:0">Converts room dimensions into material quantity in the correct unit, with waste, plank direction, and transitions — not a naïve area × price. <span class="prov conf">confirmed in BOSS</span></p>
    <div class="card" style="margin:14px 0"><div class="card-body">
      <div class="meta">
        <dt>Room</dt><dd>Great Room</dd>
        <dt>Floor area</dt><dd class="t-mono">384 sq ft</dd>
        <dt>Product</dt><dd>White Oak — Wirebrushed</dd>
        <dt>Unit of measure</dt><dd><span class="badge accent"><span class="d"></span>sq ft</span></dd>
      </div>
    </div></div>
    <div class="divider"><span class="lbl">Calculation</span><span class="line"></span></div>
    <table class="tbl"><tbody>
      <tr><td>Net floor area</td><td class="num tnum">384.0 sq ft</td></tr>
      <tr><td>Waste factor — diagonal layout</td><td class="num tnum">+10%</td></tr>
      <tr><td>Plank direction — run long axis</td><td class="num tnum">included</td></tr>
      <tr><td>Transitions / thresholds (3)</td><td class="num tnum">+2.4 sq ft</td></tr>
      <tr style="background:var(--accent-bg)"><td class="primary">Order quantity</td><td class="num tnum primary">422.4 sq ft</td></tr>
    </tbody></table>
    <div class="notice info" style="margin-top:16px"><span data-ic="info"></span><div>Carpet would compute in <b>sq yd</b>; cabinets in <b>lineal feet</b>. The calculator respects each category's unit so takeoffs and POs stay trustworthy.</div></div>
    <button class="btn primary mt-16" style="width:100%"><span data-ic="check"></span>Apply 422.4 sq ft to line item</button>
  `;
  S.resolveIcons(document.getElementById('calcBody'));
  S.resolveIcons(document.getElementById('calcDrawer'));

  // ============ INTERACTIVITY ============
  // Colors panel (distinct color-selection step)
  const colorRows = [
    ['Great Room', 'White Oak — Wirebrushed', 'Natural', ['Natural','Smoked','Driftwood'], 'ok'],
    ['Kitchen', 'Quartz — Calacatta Gold', 'Calacatta Gold', ['Calacatta Gold','Calacatta Nuvo','Brittanicca'], 'ok'],
    ['Kitchen', 'Shaker Maple', 'Pure White', ['Pure White','Dover White','Linen','Espresso'], 'warn'],
    ['Primary Bath', 'Carrara Look 12×24', 'Bianco', ['Bianco','Grigio','Statuario'], 'outstanding'],
    ['Primary Bed', 'Mohave Plush Carpet', '— not selected —', ['Greige','Sandstone','Pewter'], 'outstanding'],
  ];
  document.getElementById('colorsPanel').innerHTML = `
    <div class="notice info mb-16"><span data-ic="palette"></span><div>Color selection is a <b>distinct step</b> from product selection — it often happens later and has its own deadlines. <span class="prov boss">BOSS</span></div></div>
    <div class="card"><div class="card-head"><div class="card-title"><span data-ic="swatch"></span>Color schedule</div><span class="card-sub">Per-room finish choices</span></div>
    <div class="card-body flush"><div class="tbl-wrap"><table class="tbl tbl-clickable"><thead><tr><th>Room</th><th>Product line</th><th>Color / finish</th><th class="right">Status</th></tr></thead><tbody id="colorBody"></tbody></table></div></div></div>`;
  const stMap = { ok:'<span class="badge ok"><span class="d"></span>Selected', warn:'<span class="badge warn"><span class="d"></span>Tentative', outstanding:'<span class="badge danger"><span class="d"></span>Outstanding' };
  document.getElementById('colorBody').innerHTML = colorRows.map((c,i) => `<tr data-cidx="${i}"><td class="muted">${c[0]}</td><td class="primary">${c[1]}</td><td>${c[2].startsWith('—')?'<span class="muted">'+c[2]+'</span>':c[2]}</td><td class="right">${stMap[c[4]]}</span></td></tr>`).join('');
  S.resolveIcons(document.getElementById('colorsPanel'));
  document.querySelectorAll('#colorBody tr').forEach(tr => tr.addEventListener('click', () => {
    const c = colorRows[+tr.dataset.cidx];
    S.modal({ eyebrow: c[0] + ' · color selection', title: c[1],
      body: `<p class="modal-intro">Choose the specific color / finish for this product line.</p>
        <div class="swatch-grid">${c[3].map((opt,i)=>`<label class="swatch-opt ${opt===c[2]?'on':''}"><input type="radio" name="col" ${opt===c[2]?'checked':''} data-opt="${opt}"><span class="swatch" style="background:${['#c9a878','#b98a5e','#a8916f','#6f7479','#cdbfa6','#ede9e0'][i%6]}"></span><span class="swatch-name">${opt}</span></label>`).join('')}</div>`,
      actions: [{ label:'Cancel', kind:'ghost' }, { label:'Save color', kind:'primary', icon:'check', onClick:(m)=>{ const sel=m.querySelector('input[name=col]:checked'); S.toast(`${c[1]} → ${sel?sel.dataset.opt:c[2]} saved for ${c[0]}.`); } }] });
  }));

  // Takeoffs panel
  const takeoffs = [
    ['Great Room','Hardwood','sq ft', 422.4],['Kitchen','Tile','sq ft', 268.0],['Kitchen','Cabinets','lin ft', 38.0],
    ['Kitchen','Countertops','sq ft', 64.0],['Primary Bed','Carpet','sq yd', 30.0],['Primary Bath','Tile','sq ft', 146.0],
    ['Bed 2 & 3','Carpet','sq yd', 37.0],['Entry / Hall','Tile','sq ft', 96.0],
  ];
  document.getElementById('takeoffsPanel').innerHTML = `
    <div class="notice accent mb-16"><span data-ic="ruler"></span><div>Auto-calculated per lot from plan dimensions, in each category's correct unit — the version purchasing and installers trust. <span class="prov conf">confirmed</span></div></div>
    <div class="card"><div class="card-head"><div class="card-title"><span data-ic="ruler"></span>Measurements & takeoffs</div><button class="btn ghost sm" data-toast="Takeoff sheet exported (demo).">${S.icon('download')}Export</button></div>
    <div class="card-body flush"><div class="tbl-wrap"><table class="tbl"><thead><tr><th>Room</th><th>Category</th><th>Unit</th><th class="right">Order qty</th></tr></thead><tbody>${takeoffs.map(t=>`<tr><td class="primary">${t[0]}</td><td><span class="tag">${t[1]}</span></td><td class="muted t-mono">${t[2]}</td><td class="num right tnum fw-600">${t[3].toFixed(1)}</td></tr>`).join('')}</tbody></table></div></div></div>`;
  S.resolveIcons(document.getElementById('takeoffsPanel'));

  // Scenarios — selectable (radio behavior), update total
  const scenTotals = { 'Upgraded kitchen':'+$1,040', 'Builder-grade baseline':'$0', 'Full premium package':'+$4,820' };
  function bindScenarios() {
    document.querySelectorAll('#scenarios > div').forEach((row,i) => {
      row.style.cursor='pointer';
      row.addEventListener('click', () => {
        document.querySelectorAll('#scenarios > div').forEach(r=>{ r.style.background=''; const dot=r.querySelector('span span'); const ring=r.querySelector('span'); if(ring){ring.style.border='2px solid var(--line-2)';} if(dot)dot.remove(); });
        row.style.background='var(--accent-bg)';
        const ring=row.querySelector('span'); ring.style.border='2px solid var(--accent)'; ring.innerHTML='<span style="width:7px;height:7px;border-radius:50%;background:var(--accent)"></span>';
        const name=row.querySelector('.fw-600').textContent;
        const tot=scenTotals[name]||'$0';
        document.querySelector('.t-display.fw-700').textContent=tot;
        document.querySelector('.t-display.fw-700').style.color = tot==='$0'?'var(--ok)':'var(--danger)';
        S.toast(`Scenario “${name}” applied — total ${tot} over allowance.`);
      });
    });
  }
  bindScenarios();

  // header + finalize buttons
  const topBtns = document.querySelectorAll('.page-head .btn');
  topBtns[0].addEventListener('click', () => { document.querySelector('#studioTabs button[data-tab="products"]').click(); S.toast('Showing all what-if scenarios in the right panel.'); });
  topBtns[1].addEventListener('click', () => S.modal({ eyebrow:'Design Studio', title:'Start a new selection session',
    body:`<p class="modal-intro">Open a buyer's finish-selection session.</p><div class="form-grid"><label class="field"><span class="field-lbl">Buyer</span><input data-field="buyer" placeholder="Buyer name"/></label><label class="field"><span class="field-lbl">Lot</span><input data-field="lot" placeholder="Lot #"/></label><label class="field span-2"><span class="field-lbl">Plan</span><select data-field="plan">${DEMO.plans.map(p=>`<option>${p.name}</option>`).join('')}</select></label></div>`,
    actions:[{label:'Cancel',kind:'ghost'},{label:'Open session',kind:'primary',icon:'studio',onClick:(m)=>{const f=S.readForm(m);S.toast(`Session opened for ${f.buyer||'new buyer'}.`);}}] }));

  document.querySelector('.studio .btn.primary[style*="width:100%"]').addEventListener('click', () => {
    S.confirmAction({ eyebrow:'Design Studio', title:'Finalize selections', icon:'send',
      message:'Lock the current selection package and raise a Price Request for items needing vendor pricing? You can still re-open before contract.',
      confirmLabel:'Finalize → Price Request', onConfirm:()=>{ S.toast('Selections finalized — Price Request PR-231 created.'); setTimeout(()=>location.href='quotes.html',1000); } });
  });

  // selection rows → product picker modal (swap product)
  document.querySelectorAll('#rooms .sel-row, #rooms tr').forEach(()=>{}); // rows are rendered as table rows below
  // wire after rooms render: delegate
  document.getElementById('rooms').addEventListener('click', e => {
    if (e.target.closest('[data-drawer]')) return; // calc button handled by drawer
    const tr = e.target.closest('tr');
    if (!tr || !tr.querySelector('.primary')) return;
    const name = tr.querySelector('.primary') ? tr.querySelector('td').textContent.trim() : '';
    const cat = (tr.querySelector('.tag')||{}).textContent || '';
    const options = DEMO.catalog.filter(c => c.cat === cat || cat==='');
    S.modal({ eyebrow:'Swap product', title: name || 'Change selection', size:'lg',
      body:`<p class="modal-intro">Pick a replacement from the price book. Net-over-standard recalculates automatically.</p>
        <div class="prod-grid">${(options.length?options:DEMO.catalog).slice(0,8).map(c=>`<button class="prod-card" data-toast="${c.name} selected — line updated, net recalculated.">
          <span class="swatch" style="background:${c.color}"></span>
          <span class="prod-name">${c.name}</span>
          <span class="prod-meta">${c.cat} · $${c.sell.toFixed(2)}/${c.unit}</span></button>`).join('')}</div>`,
      actions:[{label:'Close',kind:'ghost'}] });
  });

  // calculator Apply button (inside drawer)
  document.querySelector('#calcBody .btn.primary')?.addEventListener('click', () => { S.closeDrawers(); S.toast('Applied 422.4 sq ft to White Oak — Great Room line.'); });
</script>
</body>
</html>
