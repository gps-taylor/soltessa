<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Scheduling · Soltessa</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
<div id="app" data-page="scheduling"></div>
<div class="drawer-scrim" id="scrim"></div>

<template id="page">
  <div class="page-head">
    <div class="page-head-row">
      <div>
        <div class="eyebrow">Module 7 · Install coordination <span class="prov conf">confirmed — Scheduler Plus</span></div>
        <h1 class="page-title">Scheduling</h1>
        <p class="page-sub">Coordinate warehouse pickup and on-site install, and manage the construction stages that drive option cutoffs. When a task slips, downstream dates recalculate automatically.</p>
      </div>
      <div class="flex gap-10">
        <button class="btn primary"><span data-ic="plus"></span>Schedule install</button>
        <div class="seg" id="view"><button class="active" data-v="cal">Calendar</button><button data-v="master">Master schedules</button></div>
      </div>
    </div>
  </div>

  <div class="grid grid-2-1 mb-16">
    <!-- calendar -->
    <div class="card">
      <div class="card-head">
        <div class="card-title"><span data-ic="scheduling"></span>August 2026 — install calendar</div>
        <div class="flex gap-12" style="font-size:11.5px">
          <span class="flex items-center gap-8"><span style="width:10px;height:10px;border-radius:3px;background:var(--accent)"></span>Install</span>
          <span class="flex items-center gap-8"><span style="width:10px;height:10px;border-radius:3px;background:var(--info)"></span>Pickup</span>
          <span class="flex items-center gap-8"><span style="width:10px;height:10px;border-radius:3px;background:var(--ok)"></span>Milestone</span>
        </div>
      </div>
      <div class="card-body">
        <div class="cal" id="cal"></div>
      </div>
    </div>

    <!-- cutoff management -->
    <div class="card">
      <div class="card-head"><div class="card-title"><span data-ic="alert"></span>Option cutoffs <span class="prov conf">confirmed</span></div></div>
      <div class="card-body">
        <div class="notice warn mb-16"><span data-ic="info"></span><div>Construction stage drives per-category cutoffs. Reaching a stage <b>locks selections</b> in Design Studio and warns sales.</div></div>
        <div class="stack gap-12" id="cutoffs"></div>
      </div>
    </div>
  </div>

  <!-- conflicts + master schedule -->
  <div class="grid grid-2">
    <div class="card">
      <div class="card-head"><div class="card-title"><span data-ic="layers"></span>Master schedule — flooring phase</div><span class="badge neutral">Reusable template</span></div>
      <div class="card-body flush"><div class="tbl-wrap"><table class="tbl">
        <thead><tr><th>Task</th><th>Depends on</th><th class="right">Lead</th><th class="right">Milestone</th></tr></thead><tbody id="master"></tbody>
      </table></div></div>
    </div>
    <div class="card">
      <div class="card-head"><div class="card-title"><span data-ic="users"></span>Crew load — this week</div></div>
      <div class="card-body">
        <div class="stack gap-16" id="crew"></div>
        <div class="notice danger mt-16" style="background:var(--danger-bg);border-color:#e8c4bf;color:var(--danger)"><span data-ic="alert"></span><div>Premier Floors double-booked Thursday — Lot 14 and Lot 05 both 8:00 AM. Resolve before issuing.</div></div>
      </div>
    </div>
  </div>
</template>

<script src="assets/data/demo.js"></script>
<script src="assets/js/app.js"></script>
<script>
  const S=window.Soltessa; S.mount({active:'scheduling'});

  // calendar — Aug 2026 starts Saturday
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const events={12:['install|Hardwood · Lot 14'],14:['pickup|Carpet pickup · Lot 05'],19:['install|Tile · Lot 14'],20:['milestone|Drywall · Lot 22'],26:['install|Cabinets · Lot 14','install|Counters · Lot 17'],6:['milestone|Cabinet rough-in · Lot 14'],11:['pickup|Stone pickup · Lot 22']};
  let html=days.map(d=>`<div class="cal-h">${d}</div>`).join('');
  // Aug 1 2026 = Saturday (index 6)
  const offset=6, total=31;
  for(let i=0;i<offset;i++) html+=`<div class="cal-d out"></div>`;
  for(let d=1;d<=total;d++){
    const evs=(events[d]||[]).map(e=>{const[t,l]=e.split('|');return `<div class="cal-ev ${t}">${l}</div>`}).join('');
    html+=`<div class="cal-d"><div class="dn">${d}</div>${evs}</div>`;
  }
  document.getElementById('cal').innerHTML=html;

  const cutoffs=[
    ['Cabinets & countertops','Cabinet rough-in','Aug 6','danger','Locks in 6 days'],
    ['Tile','Drywall','Aug 20','warn','On track'],
    ['Hardwood & carpet','Pre-trim','Sept 2','ok','Open'],
  ];
  document.getElementById('cutoffs').innerHTML=cutoffs.map(c=>`
    <div class="flex items-center between">
      <div><div class="fw-600 fs-13">${c[0]}</div><div class="muted fs-12">at ${c[1]} · ${c[2]}</div></div>
      <span class="badge ${c[3]}"><span class="d"></span>${c[4]}</span>
    </div>`).join('');

  const master=[
    ['Material delivery','PO acknowledged','3 days','—'],
    ['Subfloor prep','Material delivery','1 day','—'],
    ['Hardwood install','Subfloor prep','2 days','★'],
    ['Tile install','Hardwood install','2 days','—'],
    ['Final walkthrough','All installs','1 day','★'],
  ];
  document.getElementById('master').innerHTML=master.map(m=>`<tr><td class="primary">${m[0]}</td><td class="muted">${m[1]}</td><td class="num right">${m[2]}</td><td class="right">${m[3]==='★'?'<span style="color:var(--accent)">★</span>':'<span class="muted">—</span>'}</td></tr>`).join('');

  const crew=[
    ['Premier Floors','Hardwood · Carpet',82],
    ['TileRight','Tile · Backsplash',64],
    ['Vegas Cabinet Co','Cabinets',47],
    ['StoneWorks','Countertops',58],
  ];
  document.getElementById('crew').innerHTML=crew.map(c=>`
    <div><div class="allow-row"><span class="cat">${c[0]}</span><span class="muted">${c[2]}% booked</span></div>
    <div class="allow-track"><div class="allow-fill ${c[2]>80?'warn':''}" style="width:${c[2]}%;background:${c[2]>80?'var(--warn)':'var(--info)'}"></div></div>
    <div class="muted fs-12" style="margin-top:3px">${c[1]}</div></div>`).join('');

  // ============ INTERACTIVITY ============
  // Schedule install
  document.querySelector('.page-head .btn.primary').addEventListener('click', () => S.modal({
    eyebrow:'Scheduling', title:'Schedule an install',
    body:`<div class="form-grid">
      <label class="field"><span class="field-lbl">Lot</span><input data-field="lot" placeholder="Lot 14 · Sienna Pass"/></label>
      <label class="field"><span class="field-lbl">Work type</span><select data-field="type"><option>Hardwood install</option><option>Tile install</option><option>Carpet install</option><option>Cabinet set</option><option>Countertop template</option><option>Material pickup</option></select></label>
      <label class="field"><span class="field-lbl">Installer / crew</span><select data-field="crew"><option>Premier Floors</option><option>TileRight</option><option>Vegas Cabinet Co</option><option>StoneWorks</option></select></label>
      <label class="field"><span class="field-lbl">Date</span><input data-field="date" placeholder="Aug 14, 2026"/></label>
    </div>
    <div class="notice info mt-16"><span data-ic="info"></span><div>Downstream task dates auto-recalculate if this shifts a dependency.</div></div>`,
    actions:[{label:'Cancel',kind:'ghost'},{label:'Add to calendar',kind:'primary',icon:'check',onClick:(m)=>{const f=S.readForm(m);S.toast(`${f.type} scheduled for ${f.lot||'lot'} on ${f.date||'TBD'} (demo).`);}}] }));

  // calendar events → detail
  document.querySelectorAll('#cal .cal-ev').forEach(ev => { ev.style.cursor='pointer'; ev.addEventListener('click', () => {
    const label = ev.textContent; const type = ev.classList.contains('install')?'Install':ev.classList.contains('pickup')?'Pickup':'Milestone';
    S.modal({ eyebrow:'Calendar · '+type, title:label, size:'sm',
      body:`<div class="meta-list"><div class="ml-row"><span class="ml-k">Type</span><span class="ml-v"><span class="tag">${type}</span></span></div><div class="ml-row"><span class="ml-k">Crew</span><span class="ml-v">Premier Floors</span></div><div class="ml-row"><span class="ml-k">Materials</span><span class="ml-v">From PO-3319</span></div></div>`,
      actions:[{label:'Close',kind:'ghost'},{label:'Reschedule',kind:'primary',icon:'edit',onClick:()=>S.toast('Reschedule — downstream dates will recalculate (demo).')}] });
  });});

  // cutoff rows → detail (extend / lock now)
  document.querySelectorAll('#cutoffs > div').forEach((row,i)=>{ row.style.cursor='pointer'; row.addEventListener('click',()=>{
    const c=cutoffs[i];
    S.modal({ eyebrow:'Option cutoff', title:c[0], size:'sm',
      body:`<div class="meta-list"><div class="ml-row"><span class="ml-k">Construction stage</span><span class="ml-v">${c[1]}</span></div><div class="ml-row"><span class="ml-k">Cutoff date</span><span class="ml-v">${c[2]}</span></div><div class="ml-row"><span class="ml-k">Status</span><span class="ml-v"><span class="badge ${c[3]}"><span class="d"></span>${c[4]}</span></span></div></div>
        <div class="notice warn mt-16"><span data-ic="alert"></span><div>Reaching this stage locks the matching selections in Design Studio.</div></div>`,
      actions:[{label:'Extend cutoff',kind:'ghost',onClick:()=>S.toast(`${c[0]} cutoff extended (demo).`)},{label:'Lock now',kind:'primary',icon:'check',onClick:()=>S.toast(`${c[0]} selections locked (demo).`)}] });
  });});

  // master schedule rows → edit lead time
  document.querySelectorAll('#master tr').forEach((tr,i)=>{ tr.classList.add('tbl-clickable'); tr.addEventListener('click',()=>{
    const m=master[i];
    S.modal({ eyebrow:'Master schedule task', title:m[0], size:'sm',
      body:`<div class="form-grid"><label class="field"><span class="field-lbl">Depends on</span><input data-field="dep" value="${m[1]}"/></label><label class="field"><span class="field-lbl">Lead time</span><input data-field="lead" value="${m[2]}"/></label></div>`,
      actions:[{label:'Cancel',kind:'ghost'},{label:'Save task',kind:'primary',icon:'check',onClick:()=>S.toast(`“${m[0]}” updated — schedule regenerated (demo).`)}] });
  });});

  // crew rows → detail
  document.querySelectorAll('#crew > div').forEach((row,i)=>{ row.style.cursor='pointer'; row.addEventListener('click',()=>{
    const c=crew[i];
    S.drawer({ eyebrow:'Crew load', title:c[0], width:460,
      body:`<div class="meta-list mb-16"><div class="ml-row"><span class="ml-k">Categories</span><span class="ml-v">${c[1]}</span></div><div class="ml-row"><span class="ml-k">Booked this week</span><span class="ml-v t-mono">${c[2]}%</span></div><div class="ml-row"><span class="ml-k">Jobs scheduled</span><span class="ml-v t-mono">${Math.round(c[2]/12)}</span></div></div>
        ${c[2]>80?'<div class="notice warn"><span data-ic="alert"></span><div>Near capacity — consider redistributing jobs.</div></div>':'<div class="notice info"><span data-ic="info"></span><div>Healthy utilization.</div></div>'}
        <div class="flex gap-8 mt-16"><button class="btn ghost sm" data-drawer-close>Close</button></div>` });
  });});

  // double-booking resolve
  const conflict = document.querySelector('.notice.danger');
  if (conflict) { conflict.style.cursor='pointer'; conflict.addEventListener('click', () => S.confirmAction({
    eyebrow:'Conflict', title:'Resolve double-booking', danger:true, icon:'check',
    message:'Premier Floors is booked for Lot 14 and Lot 05 at the same time Thursday. Move Lot 05 carpet pickup to Friday 8:00 AM?',
    confirmLabel:'Move to Friday', onConfirm:()=>S.toast('Lot 05 pickup moved to Friday — conflict resolved (demo).') })); }

  // view toggle: Calendar vs Master schedules
  const calGrid = document.querySelector('.grid.grid-2-1');
  document.querySelectorAll('#view button').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('#view button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    const v=b.dataset.v;
    // master schedule card is the 2nd grid block; emphasize by scrolling
    if (v==='master') { document.getElementById('master').scrollIntoView({behavior:'smooth',block:'center'}); S.toast('Showing reusable master schedule templates.'); }
    else { window.scrollTo({top:0,behavior:'smooth'}); }
  }));
</script>
</body>
</html>
