<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Scheduling · Soltessa</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
<div id="app" data-page="scheduling"></div>
<div class="drawer-scrim" id="scrim"></div>

<template id="page">
  <div class="page-head">
    <div class="page-head-row">
      <div>
        <div class="eyebrow">Module 7 · Install coordination <span class="prov conf">confirmed — Scheduler Plus</span></div>
        <h1 class="page-title">Scheduling</h1>
        <p class="page-sub">Coordinate warehouse pickup and on-site install, and manage the construction stages that drive option cutoffs. When a task slips, downstream dates recalculate automatically.</p>
      </div>
      <div class="seg" id="view"><button class="active">Calendar</button><button>Master schedules</button></div>
    </div>
  </div>

  <div class="grid grid-2-1 mb-16">
    <!-- calendar -->
    <div class="card">
      <div class="card-head">
        <div class="card-title"><span data-ic="scheduling"></span>August 2026 — install calendar</div>
        <div class="flex gap-12" style="font-size:11.5px">
          <span class="flex items-center gap-8"><span style="width:10px;height:10px;border-radius:3px;background:var(--accent)"></span>Install</span>
          <span class="flex items-center gap-8"><span style="width:10px;height:10px;border-radius:3px;background:var(--info)"></span>Pickup</span>
          <span class="flex items-center gap-8"><span style="width:10px;height:10px;border-radius:3px;background:var(--ok)"></span>Milestone</span>
        </div>
      </div>
      <div class="card-body">
        <div class="cal" id="cal"></div>
      </div>
    </div>

    <!-- cutoff management -->
    <div class="card">
      <div class="card-head"><div class="card-title"><span data-ic="alert"></span>Option cutoffs <span class="prov conf">confirmed</span></div></div>
      <div class="card-body">
        <div class="notice warn mb-16"><span data-ic="info"></span><div>Construction stage drives per-category cutoffs. Reaching a stage <b>locks selections</b> in Design Studio and warns sales.</div></div>
        <div class="stack gap-12" id="cutoffs"></div>
      </div>
    </div>
  </div>

  <!-- conflicts + master schedule -->
  <div class="grid grid-2">
    <div class="card">
      <div class="card-head"><div class="card-title"><span data-ic="layers"></span>Master schedule — flooring phase</div><span class="badge neutral">Reusable template</span></div>
      <div class="card-body flush"><div class="tbl-wrap"><table class="tbl">
        <thead><tr><th>Task</th><th>Depends on</th><th class="right">Lead</th><th class="right">Milestone</th></tr></thead><tbody id="master"></tbody>
      </table></div></div>
    </div>
    <div class="card">
      <div class="card-head"><div class="card-title"><span data-ic="users"></span>Crew load — this week</div></div>
      <div class="card-body">
        <div class="stack gap-16" id="crew"></div>
        <div class="notice danger mt-16" style="background:var(--danger-bg);border-color:#e8c4bf;color:var(--danger)"><span data-ic="alert"></span><div>Premier Floors double-booked Thursday — Lot 14 and Lot 05 both 8:00 AM. Resolve before issuing.</div></div>
      </div>
    </div>
  </div>
</template>

<script src="assets/data/demo.js"></script>
<script src="assets/js/app.js"></script>
<script>
  const S=window.Soltessa; S.mount({active:'scheduling'});

  // calendar — Aug 2026 starts Saturday
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const events={12:['install|Hardwood · Lot 14'],14:['pickup|Carpet pickup · Lot 05'],19:['install|Tile · Lot 14'],20:['milestone|Drywall · Lot 22'],26:['install|Cabinets · Lot 14','install|Counters · Lot 17'],6:['milestone|Cabinet rough-in · Lot 14'],11:['pickup|Stone pickup · Lot 22']};
  let html=days.map(d=>`<div class="cal-h">${d}</div>`).join('');
  // Aug 1 2026 = Saturday (index 6)
  const offset=6, total=31;
  for(let i=0;i<offset;i++) html+=`<div class="cal-d out"></div>`;
  for(let d=1;d<=total;d++){
    const evs=(events[d]||[]).map(e=>{const[t,l]=e.split('|');return `<div class="cal-ev ${t}">${l}</div>`}).join('');
    html+=`<div class="cal-d"><div class="dn">${d}</div>${evs}</div>`;
  }
  document.getElementById('cal').innerHTML=html;

  const cutoffs=[
    ['Cabinets & countertops','Cabinet rough-in','Aug 6','danger','Locks in 6 days'],
    ['Tile','Drywall','Aug 20','warn','On track'],
    ['Hardwood & carpet','Pre-trim','Sept 2','ok','Open'],
  ];
  document.getElementById('cutoffs').innerHTML=cutoffs.map(c=>`
    <div class="flex items-center between">
      <div><div class="fw-600 fs-13">${c[0]}</div><div class="muted fs-12">at ${c[1]} · ${c[2]}</div></div>
      <span class="badge ${c[3]}"><span class="d"></span>${c[4]}</span>
    </div>`).join('');

  const master=[
    ['Material delivery','PO acknowledged','3 days','—'],
    ['Subfloor prep','Material delivery','1 day','—'],
    ['Hardwood install','Subfloor prep','2 days','★'],
    ['Tile install','Hardwood install','2 days','—'],
    ['Final walkthrough','All installs','1 day','★'],
  ];
  document.getElementById('master').innerHTML=master.map(m=>`<tr><td class="primary">${m[0]}</td><td class="muted">${m[1]}</td><td class="num right">${m[2]}</td><td class="right">${m[3]==='★'?'<span style="color:var(--accent)">★</span>':'<span class="muted">—</span>'}</td></tr>`).join('');

  const crew=[
    ['Premier Floors','Hardwood · Carpet',82],
    ['TileRight','Tile · Backsplash',64],
    ['Vegas Cabinet Co','Cabinets',47],
    ['StoneWorks','Countertops',58],
  ];
  document.getElementById('crew').innerHTML=crew.map(c=>`
    <div><div class="allow-row"><span class="cat">${c[0]}</span><span class="muted">${c[2]}% booked</span></div>
    <div class="allow-track"><div class="allow-fill ${c[2]>80?'warn':''}" style="width:${c[2]}%;background:${c[2]>80?'var(--warn)':'var(--info)'}"></div></div>
    <div class="muted fs-12" style="margin-top:3px">${c[1]}</div></div>`).join('');

  document.querySelectorAll('#view button').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('#view button').forEach(x=>x.classList.remove('active'));b.classList.add('active');}));
</script>
</body>
</html>
