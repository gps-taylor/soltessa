<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dashboard · Soltessa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
<div id="app" data-page="dashboard"></div>
<div class="drawer-scrim" id="scrim"></div>

<template id="page">
  <div class="page-head">
    <div class="page-head-row">
      <div>
        <div class="eyebrow" id="dashEyebrow">Tuesday · June 29, 2026 &nbsp;·&nbsp; Builders Design Group</div>
        <h1 class="page-title">Good morning, Taylor</h1>
        <p class="page-sub" id="dashSub">Four communities in flight across two builders. Six selection sessions need attention today, and two subcontractor insurance certificates lapse this week.</p>
      </div>
      <div class="flex gap-10">
        <button class="btn"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5M12 15V3"/></svg>Export brief</button>
        <button class="btn primary"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 5v14M5 12h14"/></svg>New selection session</button>
      </div>
    </div>
  </div>

  <div data-scopebar="scoped"></div>

  <!-- Company roll-up (All-developments view only) -->
  <div id="rollup"></div>

  <!-- Signature: the data lineage rail -->
  <div style="margin-bottom:22px">
    <div class="flex items-center between mb-16" style="margin-bottom:9px">
      <div class="eyebrow" style="margin:0">The Soltessa lineage &nbsp;·&nbsp; one home, end to end</div>
      <span class="muted fs-12">Lot 14 · Sienna Pass · Acacia 2210 · the Patels</span>
    </div>
    <div class="lineage" id="lineage"></div>
  </div>

  <!-- KPIs -->
  <div class="kpi-grid mb-16" id="kpis"></div>

  <div class="grid grid-2-1 mb-16">
    <!-- Attention queue -->
    <div class="card">
      <div class="card-head">
        <div>
          <div class="card-title">${ICON_inbox} Needs your attention</div>
          <div class="card-sub">Items blocking progress along the pipeline</div>
        </div>
        <a class="btn sm ghost" href="quotes.html">View all</a>
      </div>
      <div class="card-body flush">
        <div class="tbl-wrap">
          <table class="tbl tbl-clickable">
            <thead><tr><th>Item</th><th>Stage</th><th>Lot / Community</th><th>Owner</th><th class="right">Status</th></tr></thead>
            <tbody id="attn"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Allowance pulse -->
    <div class="card">
      <div class="card-head">
        <div class="card-title">${ICON_dollar} Allowance pulse</div>
      </div>
      <div class="card-body">
        <p class="muted fs-12" style="margin:0 0 16px">Live selections vs. builder allowance across active lots this week.</p>
        <div id="allow"></div>
        <div class="notice accent mt-16">
          ${ICON_info}
          <div>Net-option logic applied — upgrades show the <b>net</b> over standard, never gross.</div>
        </div>
      </div>
    </div>
  </div>

  <div class="grid grid-2">
    <!-- Activity feed -->
    <div class="card">
      <div class="card-head"><div class="card-title">${ICON_clock} Recent activity</div></div>
      <div class="card-body">
        <div class="feed" id="feed"></div>
      </div>
    </div>

    <!-- This week installs + expiring insurance -->
    <div class="stack gap-16">
      <div class="card">
        <div class="card-head"><div class="card-title">${ICON_truck} This week's installs</div><span class="badge accent"><span class="d"></span>7 scheduled</span></div>
        <div class="card-body flush">
          <div class="tbl-wrap"><table class="tbl"><tbody id="installs"></tbody></table></div>
        </div>
      </div>
      <div class="card">
        <div class="card-head"><div class="card-title">${ICON_alert} Insurance expiring</div></div>
        <div class="card-body">
          <div class="stack gap-12" id="insurance"></div>
        </div>
      </div>
    </div>
  </div>
</template>

<script src="assets/data/demo.js"></script>
<script src="assets/js/app.js"></script>
<script>
  // inline icon placeholders resolved before mount
  const S = window.Soltessa;
  document.getElementById('page').innerHTML = document.getElementById('page').innerHTML
    .replaceAll('${ICON_inbox}', S.icon('inbox'))
    .replaceAll('${ICON_dollar}', S.icon('dollar'))
    .replaceAll('${ICON_info}', S.icon('info'))
    .replaceAll('${ICON_clock}', S.icon('clock'))
    .replaceAll('${ICON_truck}', S.icon('truck'))
    .replaceAll('${ICON_alert}', S.icon('alert'));

  S.mount({ active: 'dashboard' });

  // ---- scope-aware dashboard (two altitudes) ----
  const SC = S.scope();
  const commName = SC.isAll ? null : SC.dev.name;
  if (!SC.isAll) {
    document.getElementById('dashEyebrow').innerHTML = `Tuesday · June 29, 2026 &nbsp;·&nbsp; ${SC.dev.name} · ${SC.dev.builder}`;
    const b = DEMO.byComm(DEMO.buyers, commName);
    const open = DEMO.byComm(DEMO.priceRequests, commName).filter(p=>p.status==='Awaiting').length;
    document.getElementById('dashSub').textContent = `${SC.dev.lots} lots in ${SC.dev.name}. ${b.length} active buyers, ${open} open price request${open===1?'':'s'}. Focused view — switch scope to see the whole company.`;
  } else {
    // Company command center: per-development roll-up
    const rows = DEMO.communities.map(c => {
      const buyers = DEMO.byComm(DEMO.buyers, c.name).length;
      const q = DEMO.byComm(DEMO.quotes, c.name).reduce((s,x)=>s+x.amount,0);
      const pos = DEMO.byComm(DEMO.pos, c.name).length;
      const tickets = DEMO.byComm(DEMO.serviceTickets, c.name).length;
      const sold = c.status.sold + c.status.production + c.status.closed;
      const pct = Math.round((sold / c.lots) * 100);
      return { c, buyers, q, pos, tickets, sold, pct };
    });
    document.getElementById('rollup').innerHTML = `
      <div class="card mb-16">
        <div class="card-head"><div><div class="card-title">${S.icon('grid')} Company roll-up</div><div class="card-sub">Every development at a glance — click any row to focus</div></div><span class="badge accent"><span class="d"></span>${DEMO.communities.length} communities</span></div>
        <div class="card-body flush"><div class="tbl-wrap"><table class="tbl tbl-clickable">
          <thead><tr><th>Development</th><th>Builder</th><th class="right">Lots</th><th class="right">Sold-through</th><th class="right">Buyers</th><th class="right">Quotes $</th><th class="right">Open POs</th><th class="right">Service</th></tr></thead>
          <tbody>${rows.map(r=>`<tr data-dev="${r.c.id}">
            <td><div class="cell-lead"><span class="lot-cell ${''}" style="width:10px;height:10px;background:${r.c.accent};border-radius:3px"></span><span class="primary">${r.c.name}</span></div><div class="muted" style="margin-left:18px">${r.c.city}</div></td>
            <td class="muted">${r.c.builder}</td>
            <td class="num right tnum">${r.c.lots}</td>
            <td class="num right"><div class="flex items-center gap-8" style="justify-content:flex-end"><span class="tnum muted">${r.pct}%</span><div class="allow-track" style="width:54px"><div class="allow-fill" style="width:${r.pct}%;background:${r.c.accent}"></div></div></div></td>
            <td class="num right tnum">${r.buyers}</td>
            <td class="num right tnum">$${Math.round(r.q/1000)}k</td>
            <td class="num right tnum">${r.pos}</td>
            <td class="num right">${r.tickets?`<span class="badge ${r.tickets>1?'warn':'neutral'}"><span class="d"></span>${r.tickets}</span>`:'<span class="muted">—</span>'}</td>
          </tr>`).join('')}</tbody>
        </table></div></div>
      </div>`;
    S.resolveIcons(document.getElementById('rollup'));
    document.querySelectorAll('#rollup tr[data-dev]').forEach(tr => tr.addEventListener('click', () => {
      try { sessionStorage.setItem('soltessa.scope', tr.dataset.dev); } catch(e){}
      location.reload();
    }));
  }

  // ---- lineage rail ----
  const steps = [
    { n: '01', label: 'Plan + Allowance', state: 'Acacia 2210', cls: 'done' },
    { n: '02', label: 'Selection', state: 'Finalized', cls: 'done' },
    { n: '03', label: 'Price Request', state: 'Answered', cls: 'done' },
    { n: '04', label: 'Quote', state: 'Approved', cls: 'done' },
    { n: '05', label: 'Contract', state: 'Signed', cls: 'done' },
    { n: '06', label: 'Purchase Orders', state: '3 issued · 1 change order', cls: 'current' },
    { n: '07', label: 'Lot', state: 'In production', cls: '' },
    { n: '08', label: 'Schedule', state: 'Install Aug 12', cls: '' },
    { n: '09', label: 'Service', state: '—', cls: '' },
  ];
  document.getElementById('lineage').innerHTML = steps.map((s, i) => {
    const sep = i < steps.length - 1 ? `<span class="lineage-sep">${S.icon('chevronR')}</span>` : '';
    return `<div class="lineage-step ${s.cls}">
      <span class="ls-num">${s.n}</span>
      <span><span class="ls-label">${s.label}</span><br><span class="ls-state">${s.state}</span></span>
    </div>${sep}`;
  }).join('');

  // ---- KPIs ----
  const kpis = [
    { label: 'Active lots', icon: 'lots', value: '83', delta: '+6 this month', d: 'up', s: [60,64,67,71,74,78,83] },
    { label: 'Pending selections', icon: 'studio', value: '14', delta: '6 need attention', d: 'flat', s: [9,11,10,13,12,15,14] },
    { label: 'Open price requests', icon: 'tag', value: '5', delta: 'avg 1.4-day turnaround', d: 'up', s: [8,7,9,6,5,6,5] },
    { label: 'Open quotes', icon: 'quotes', value: '4', delta: '$182k in flight', d: 'flat', s: [3,5,4,6,5,4,4] },
    { label: 'POs awaiting issue', icon: 'purchasing', value: '11', delta: '3 split by supplier', d: 'down', s: [18,16,15,13,12,11,11] },
    { label: 'Installs this week', icon: 'truck', value: '7', delta: '2 pickups · 5 on-site', d: 'up', s: [4,5,3,6,5,7,7] },
  ];
  document.getElementById('kpis').innerHTML = kpis.map(k => `
    <div class="kpi">
      <div class="kpi-label">${S.icon(k.icon)} ${k.label}</div>
      <div class="kpi-value">${k.value}</div>
      <div class="kpi-delta ${k.d}">${k.delta}</div>
      ${S.spark(k.s)}
    </div>`).join('');

  // ---- attention queue ----
  const attn = [
    ['Calacatta quartz price', 'Price Request', 'Lot 22 · Desert Vista', 'Cambria', '<span class="badge warn"><span class="d"></span>Awaiting vendor</span>'],
    ['Upgraded kitchen package', 'Quote', 'Lot 09 · Cholla Ridge', 'Designer', '<span class="badge info"><span class="d"></span>Pending approval</span>'],
    ['Stair-nose transition', 'Selection', 'Lot 31 · Desert Vista', 'Designer', '<span class="badge danger"><span class="d"></span>Cutoff in 2 days</span>'],
    ['Tile PO — primary bath', 'Purchase Order', 'Lot 14 · Sienna Pass', 'Purchasing', '<span class="badge neutral"><span class="d"></span>Change order</span>'],
    ['Color: cabinet finish', 'Color Selection', 'Lot 17 · Sienna Pass', 'Buyer', '<span class="badge warn"><span class="d"></span>Outstanding</span>'],
    ['Carpet allowance overage', 'Selection', 'Lot 05 · Aspen Meadows', 'Sales', '<span class="badge info"><span class="d"></span>Needs sign-off</span>'],
  ];
  const attnShown = commName ? attn.filter(r => r[2].includes(commName)) : attn;
  document.getElementById('attn').innerHTML = (attnShown.length ? attnShown : attn).map(r => `
    <tr><td class="primary">${r[0]}</td><td><span class="tag">${r[1]}</span></td>
    <td>${r[2]}</td><td class="muted">${r[3]}</td><td class="right">${r[4]}</td></tr>`).join('');
  // keep attn reference aligned for click handlers
  window._attnShown = attnShown.length ? attnShown : attn;

  // ---- allowance pulse ----
  const allow = [
    { cat: 'Flooring', used: 15240, cap: 14200 },
    { cat: 'Cabinets', used: 9120, cap: 9800 },
    { cat: 'Countertops', used: 6980, cap: 6400 },
  ];
  document.getElementById('allow').innerHTML = allow.map(a => {
    const pct = Math.min(100, (a.used / a.cap) * 100);
    const over = a.used > a.cap;
    const warn = !over && pct > 88;
    const delta = a.used - a.cap;
    const cls = over ? 'over' : (warn ? 'warn' : '');
    const dtxt = over ? `+$${delta.toLocaleString()} over` : `$${Math.abs(delta).toLocaleString()} under`;
    return `<div style="margin-bottom:15px">
      <div class="allow-row"><span class="cat">${a.cat}</span>
        <span class="delta ${over?'over':'under'}">${dtxt}</span></div>
      <div class="allow-track"><div class="allow-fill ${cls}" style="width:${pct}%"></div></div>
      <div class="muted fs-12 tnum" style="margin-top:4px">$${a.used.toLocaleString()} of $${a.cap.toLocaleString()} allowance</div>
    </div>`;
  }).join('');

  // ---- feed ----
  const feed = [
    ['ok', 'check', '<b>Quote Q-1043</b> approved by Sunridge — Lot 09 upgraded kitchen', '18 min ago'],
    ['accent', 'tag', '<b>Cambria</b> answered price request PR-228 — Calacatta Gold confirmed at $64/sq ft', '52 min ago'],
    ['info', 'purchasing', '<b>3 POs</b> generated and split across Daltile, Shaw, KraftMaid — Lot 14', '1 hr ago'],
    ['', 'studio', 'Selection finalized for <b>Lot 31 · Desert Vista</b> — Mesquite 3120', '2 hr ago'],
    ['', 'truck', 'Install completed — <b>Lot 02 · Sienna Pass</b> hardwood great room', 'Yesterday'],
    ['accent', 'edit', 'Change order CO-58 raised after re-selection on <b>Lot 14</b> primary bath tile', 'Yesterday'],
  ];
  document.getElementById('feed').innerHTML = feed.map(f => `
    <div class="feed-item">
      <div class="feed-dot ${f[0]}">${S.icon(f[1])}</div>
      <div class="feed-body"><div class="t">${f[2]}</div><div class="feed-time">${f[3]}</div></div>
    </div>`).join('');

  // ---- installs ----
  const installs = [
    ['Mon', 'Hardwood great room', 'Lot 14 · Sienna Pass', 'Premier Floors'],
    ['Tue', 'Cabinet set', 'Lot 09 · Cholla Ridge', 'Vegas Cabinet Co'],
    ['Wed', 'Countertop template', 'Lot 22 · Desert Vista', 'StoneWorks'],
    ['Thu', 'Tile — baths', 'Lot 17 · Sienna Pass', 'TileRight'],
    ['Fri', 'Carpet — bedrooms', 'Lot 05 · Aspen Meadows', 'Premier Floors'],
  ];
  document.getElementById('installs').innerHTML = installs.map(r => `
    <tr><td><span class="tag">${r[0]}</span></td><td class="primary">${r[1]}<div class="muted">${r[2]}</div></td>
    <td class="muted right">${r[3]}</td></tr>`).join('');

  // ---- insurance ----
  const ins = [
    { name: 'Premier Floors', type: 'General liability', days: 4, cls: 'danger' },
    { name: 'StoneWorks', type: 'Workers comp', days: 9, cls: 'warn' },
  ];
  document.getElementById('insurance').innerHTML = ins.map(i => `
    <div class="flex items-center between ins-row" data-ins="${i.name}" style="cursor:pointer">
      <div><div class="fw-600">${i.name}</div><div class="muted fs-12">${i.type}</div></div>
      <span class="badge ${i.cls}"><span class="d"></span>${i.days} days</span>
    </div>`).join('');

  // ============ INTERACTIVITY ============
  const hdrBtns = document.querySelectorAll('.page-head .btn');
  // Export brief
  hdrBtns[0].addEventListener('click', () => {
    S.modal({
      eyebrow: 'Dashboard', title: 'Export daily brief',
      body: `<p class="modal-intro">Generate a PDF snapshot of today's pipeline status, attention items, installs, and allowance pulse for the active development.</p>
        <div class="form-grid">
          <label class="field"><span class="field-lbl">Format</span><select data-field="fmt"><option>PDF</option><option>Excel</option><option>Email summary</option></select></label>
          <label class="field"><span class="field-lbl">Scope</span><select data-field="scope"><option>Active development</option><option>All developments</option></select></label>
          <label class="field span-2"><span class="field-lbl">Include</span>
            <div class="chip-set" data-field="incl"><button class="chip-toggle on" data-val="KPIs">KPIs</button><button class="chip-toggle on" data-val="Attention queue">Attention queue</button><button class="chip-toggle on" data-val="Installs">Installs</button><button class="chip-toggle" data-val="Activity log">Activity log</button></div></label>
        </div>`,
      actions: [{ label: 'Cancel', kind: 'ghost' }, { label: 'Generate', kind: 'primary', icon: 'download', onClick: () => S.toast('Daily brief generated — download started (demo).') }],
    });
  });
  // New selection session
  hdrBtns[1].addEventListener('click', () => newSessionModal());
  function newSessionModal() {
    S.modal({
      eyebrow: 'Design Studio', title: 'Start a new selection session',
      body: `<p class="modal-intro">Open a buyer's finish-selection session against a plan and lot. Quantities auto-fill from plan dimensions.</p>
        <div class="form-grid">
          <label class="field"><span class="field-lbl">Buyer name</span><input data-field="buyer" placeholder="e.g. Jordan & Casey Lee" /></label>
          <label class="field"><span class="field-lbl">Lot</span><input data-field="lot" placeholder="e.g. Lot 27" /></label>
          <label class="field"><span class="field-lbl">Plan</span><select data-field="plan">${DEMO.plans.map(p => `<option>${p.name}</option>`).join('')}</select></label>
          <label class="field"><span class="field-lbl">Designer</span><select data-field="designer"><option>Taylor Morgan</option><option>Dana Reyes</option></select></label>
        </div>`,
      actions: [{ label: 'Cancel', kind: 'ghost' }, { label: 'Open session', kind: 'primary', icon: 'studio', onClick: (m) => {
        const f = S.readForm(m); S.toast(`Session opened for ${f.buyer || 'new buyer'} · ${f.plan}. Redirecting…`);
        setTimeout(() => location.href = 'design-studio.html', 900);
      } }],
    });
  }

  // Lineage steps → drawer with stage detail
  const stageDetail = {
    'Plan + Allowance': 'Acacia 2210 · 2,210 sq ft · 3 bd / 2.5 ba. Allowances: Flooring $14,200 · Cabinets $9,800 · Countertops $6,400.',
    'Selection': 'Finalized Jun 24 by Taylor Morgan. 9 line items across 8 rooms. Net over allowance: +$1,040.',
    'Price Request': 'PR-228 (Cambria · Calacatta Gold) answered at $64/sq ft, 1.4-day turnaround.',
    'Quote': 'Q-1043 issued $182k, approved by Sunridge Jun 26. Valid through Jul 26.',
    'Contract': 'Buyer selection contract signed Jun 27. Option Selection Agreement on file.',
    'Purchase Orders': '3 POs issued (Daltile, Shaw, KraftMaid). 1 change order (CO-58, +$312) pending.',
    'Lot': 'Lot 14 · Sienna Pass. In production. Plan Acacia 2210. Lot premium $18,000.',
    'Schedule': 'Hardwood great-room install Aug 12 · Premier Floors. Cabinet rough-in cutoff Jul 5.',
    'Service': 'No post-close service record yet — home is pre-close.',
  };
  document.querySelectorAll('#lineage .lineage-step').forEach(step => {
    step.style.cursor = 'pointer';
    step.addEventListener('click', () => {
      const label = step.querySelector('.ls-label').textContent;
      S.drawer({ eyebrow: 'Lineage · Lot 14 · Sienna Pass', title: label,
        body: `<div class="lineage condensed mb-16">${steps.map(s => `<div class="lineage-step ${s.label===label?'current':(s.cls==='done'?'done':'')}"><span class="ls-num">${s.cls==='done'&&s.label!==label?S.icon('check'):s.n}</span><span class="ls-label">${s.label}</span></div>`).join('<span class="lineage-sep"></span>')}</div>
          <p class="fs-13" style="line-height:1.65;color:var(--ink-2)">${stageDetail[label] || ''}</p>
          <div class="flex gap-8 mt-16"><button class="btn primary sm" data-toast="Opening full record (demo).">Open full record</button><button class="btn ghost sm" data-drawer-close>Close</button></div>` });
    });
  });

  // KPI cards → jump to relevant module
  const kpiTargets = ['lots.html','design-studio.html','quotes.html','quotes.html','purchasing.html','scheduling.html'];
  document.querySelectorAll('#kpis .kpi').forEach((card, i) => {
    card.style.cursor = 'pointer';
    card.addEventListener('click', () => location.href = kpiTargets[i]);
  });

  // Attention rows → contextual modal routed by stage
  const stageRoute = { 'Price Request':'quotes.html', 'Quote':'quotes.html', 'Selection':'design-studio.html', 'Purchase Order':'purchasing.html', 'Color Selection':'design-studio.html' };
  document.querySelectorAll('#attn tr').forEach((tr, i) => {
    tr.addEventListener('click', () => {
      const r = (window._attnShown || attn)[i];
      S.modal({ eyebrow: r[1] + ' · ' + r[2], title: r[0], size: 'sm',
        body: `<div class="meta-list">
          <div class="ml-row"><span class="ml-k">Stage</span><span class="ml-v"><span class="tag">${r[1]}</span></span></div>
          <div class="ml-row"><span class="ml-k">Lot / Community</span><span class="ml-v">${r[2]}</span></div>
          <div class="ml-row"><span class="ml-k">Owner</span><span class="ml-v">${r[3]}</span></div>
          <div class="ml-row"><span class="ml-k">Status</span><span class="ml-v">${r[4]}</span></div>
        </div>`,
        actions: [{ label: 'Dismiss', kind: 'ghost' }, { label: 'Go to ' + r[1], kind: 'primary', icon: 'arrowR', onClick: () => location.href = (stageRoute[r[1]] || 'lots.html') }] });
    });
  });

  // Feed + install rows → toast acknowledgement
  document.querySelectorAll('#feed .feed-item').forEach((el, i) => { el.style.cursor='pointer'; el.addEventListener('click', () => S.toast('Activity: ' + feed[i][2].replace(/<[^>]+>/g,''))); });
  document.querySelectorAll('#installs tr').forEach((tr, i) => { tr.style.cursor='pointer'; tr.classList.add('tbl-clickable'); tr.addEventListener('click', () => location.href='scheduling.html'); });

  // Insurance rows → modal
  document.querySelectorAll('.ins-row').forEach((row, i) => row.addEventListener('click', () => {
    const x = ins[i];
    S.confirmAction({ eyebrow:'Supplier compliance', title: x.name + ' — ' + x.type, icon:'send',
      message: `${x.type} certificate lapses in ${x.days} days. Send a renewal-request reminder to ${x.name}?`,
      confirmLabel: 'Send reminder', onConfirm: () => S.toast('Renewal reminder sent to ' + x.name + ' (demo).') });
  }));

  // "View all" already links to quotes.html via href — leave as-is.
</script>
</body>
</html>
